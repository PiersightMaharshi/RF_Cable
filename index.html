<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | QR Dashboard</title>
  <!-- QR Scanner library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      max-width: 700px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* Header / Scanner Section */
    .scanner-section {
      background: white;
      border-radius: 1.5rem;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      border: 1px solid #e0e8f0;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      color: #0a2f44;
      font-size: 1.4rem;
      font-weight: 700;
    }

    .title-icon {
      background: #0a2f44;
      color: white;
      border-radius: 0.8rem;
      padding: 0.5rem;
      font-size: 1.3rem;
    }

    .search-box {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 200px;
      padding: 0.85rem 1.2rem;
      border: 2px solid #dce5ef;
      border-radius: 2.5rem;
      font-size: 1rem;
      font-weight: 500;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #f8fafd;
      transition: all 0.2s;
      outline: none;
    }

    .serial-input:focus {
      border-color: #0a2f44;
      background: white;
      box-shadow: 0 0 0 4px rgba(10,47,68,0.08);
    }

    .btn {
      padding: 0.85rem 1.5rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #0a2f44;
      color: white;
    }

    .btn-primary:hover {
      background: #154a66;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #e8f0f8;
      color: #0a2f44;
    }

    .btn-secondary:hover {
      background: #d2e2f2;
    }

    .btn-scan {
      background: #f7b731;
      color: #0a2f44;
      font-weight: 700;
    }

    .btn-scan:hover {
      background: #f0a800;
    }

    .btn-scan.active {
      background: #e74c3c;
      color: white;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
    }

    #reader {
      width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      margin-top: 1rem;
      border: 2px solid #dce5ef;
      display: none;
    }

    #reader.active {
      display: block;
    }

    .scan-hint {
      font-size: 0.8rem;
      color: #5e6f7e;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Cable Dashboard Card */
    .cable-dashboard {
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      border: 1px solid rgba(0, 70, 120, 0.15);
      display: none;
    }

    .cable-dashboard.visible {
      display: block;
    }

    .dashboard-header {
      background: linear-gradient(105deg, #0a2f44 0%, #1c4b6e 100%);
      padding: 1.5rem 1.8rem;
      color: white;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 3px solid #f7b731;
    }

    .cable-badge {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
      color: #c7e0f5;
    }

    .cable-id {
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }

    .status-badge {
      background: #27ae60;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-badge.warning {
      background: #e67e22;
    }

    .status-badge.error {
      background: #c0392b;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      padding: 1.5rem 1.8rem;
      background: #f9fcff;
    }

    .spec-item {
      background: #ffffff;
      border-radius: 1rem;
      padding: 0.9rem 1rem;
      box-shadow: 0 4px 12px rgba(0, 32, 64, 0.06);
      border: 1px solid #e9f0f5;
    }

    .spec-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: #4a6275;
      margin-bottom: 0.2rem;
    }

    .spec-value {
      font-size: 1.15rem;
      font-weight: 650;
      color: #0b2b3f;
    }

    .connector-badge {
      background: #e5eff9;
      color: #0a3147;
      padding: 0.2rem 0.65rem;
      border-radius: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }

    .footer-note {
      background: #f0f4fa;
      padding: 0.8rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #2c4b64;
      border-top: 1px solid #d0ddea;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #7f8c8d;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 500px) {
      .search-box {
        flex-direction: column;
      }
      .btn {
        justify-content: center;
      }
      .specs-grid {
        grid-template-columns: 1fr 1fr;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Scanner & Search Section -->
    <div class="scanner-section">
      <div class="app-title">
        <span class="title-icon">📡</span>
        RF Cable Scanner
      </div>
      
      <div class="search-box">
        <input 
          type="text" 
          id="serialInput" 
          class="serial-input" 
          placeholder="Enter serial number (e.g., CBL-5G-0421)"
          autocomplete="off"
        >
        <button class="btn btn-primary" id="searchBtn">
          🔍 Search
        </button>
      </div>
      
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button class="btn btn-scan" id="scanToggleBtn">
          📷 Scan QR Code
        </button>
        <button class="btn btn-secondary" id="demoBtn">
          🎲 Load Demo Cable
        </button>
      </div>
      
      <div id="reader"></div>
      <div class="scan-hint" id="scanHint">
        💡 Point camera at the QR code on the cable label
      </div>
    </div>

    <!-- Cable Dashboard (hidden until data loaded) -->
    <div class="cable-dashboard" id="cableDashboard">
      <div class="dashboard-header">
        <div>
          <div class="cable-badge">RF Cable Assembly</div>
          <div class="cable-id" id="displayCableId">---</div>
        </div>
        <div>
          <span class="status-badge" id="statusBadge">Active</span>
        </div>
      </div>

      <div class="specs-grid" id="specsGrid">
        <!-- Dynamically populated -->
      </div>

      <div class="footer-note">
        <span id="lastTested">Last tested: ---</span>
        <span id="projectInfo">Project: ---</span>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="icon">🔍</div>
      <h3>Scan a QR code or enter a serial number</h3>
      <p style="color: #95a5a6;">The cable details will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // BACKEND SIMULATION - Replace with real API
      // ============================================
      const cableDatabase = {
        "CBL-5G-0421": {
          id: "CBL-5G-0421",
          type: "LMR-400-UF",
          length: "12.5",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "N-Type (M)",
          connB: "SMA (M)",
          frequencyMax: "6 GHz",
          status: "Tested • Pass",
          date: "2026-03-15",
          project: "Tower-A Sector 3",
          vswr: "1.15:1",
          loss: "0.85 dB"
        },
        "CBL-LMR-0192": {
          id: "CBL-LMR-0192",
          type: "LMR-240",
          length: "8.2",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "BNC (M)",
          connB: "BNC (M)",
          frequencyMax: "3 GHz",
          status: "Tested • Pass",
          date: "2026-06-28",
          project: "Lab Bench 4",
          vswr: "1.08:1",
          loss: "0.45 dB"
        },
        "CBL-RG58-7734": {
          id: "CBL-RG58-7734",
          type: "RG-58",
          length: "25.0",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "SMA (M)",
          connB: "SMA (M)",
          frequencyMax: "1 GHz",
          status: "Needs Retest",
          date: "2025-11-02",
          project: "Field Kit B",
          vswr: "1.42:1",
          loss: "2.1 dB"
        },
        "CBL-CF-9901": {
          id: "CBL-CF-9901",
          type: "CFD-400",
          length: "3.0",
          lengthUnit: "m",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "7/16 DIN (M)",
          connB: "N-Type (F)",
          frequencyMax: "8 GHz",
          status: "Damaged",
          date: "2025-08-10",
          project: "Roof Site 2",
          vswr: "3.2:1",
          loss: "4.5 dB"
        }
      };

      // ============================================
      // DOM Elements
      // ============================================
      const serialInput = document.getElementById('serialInput');
      const searchBtn = document.getElementById('searchBtn');
      const scanToggleBtn = document.getElementById('scanToggleBtn');
      const demoBtn = document.getElementById('demoBtn');
      const readerDiv = document.getElementById('reader');
      const scanHint = document.getElementById('scanHint');
      const cableDashboard = document.getElementById('cableDashboard');
      const emptyState = document.getElementById('emptyState');
      const displayCableId = document.getElementById('displayCableId');
      const statusBadge = document.getElementById('statusBadge');
      const specsGrid = document.getElementById('specsGrid');
      const lastTested = document.getElementById('lastTested');
      const projectInfo = document.getElementById('projectInfo');

      let html5QrCode = null;
      let isScanning = false;

      // ============================================
      // Fetch cable data (simulated backend call)
      // ============================================
      function fetchCableData(serialNumber) {
        // Clean the serial number
        const cleanSerial = serialNumber.trim().toUpperCase();
        
        // Simulate API call - Replace with actual fetch()
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const cable = cableDatabase[cleanSerial];
            if (cable) {
              resolve(cable);
            } else {
              reject(new Error(`Cable "${cleanSerial}" not found in database`));
            }
          }, 300); // Simulate network delay
        });

        // REAL BACKEND IMPLEMENTATION:
        // return fetch(`https://your-api.com/cables/${encodeURIComponent(cleanSerial)}`)
        //   .then(response => {
        //     if (!response.ok) throw new Error('Cable not found');
        //     return response.json();
        //   });
      }

      // ============================================
      // Render cable data to dashboard
      // ============================================
      function renderCableData(cable) {
        // Show dashboard, hide empty state
        cableDashboard.classList.add('visible');
        emptyState.style.display = 'none';

        // Header
        displayCableId.textContent = cable.id;

        // Status badge
        statusBadge.textContent = cable.status;
        statusBadge.className = 'status-badge';
        if (cable.status.toLowerCase().includes('damaged') || 
            cable.status.toLowerCase().includes('fail')) {
          statusBadge.classList.add('error');
        } else if (cable.status.toLowerCase().includes('retest') || 
                   cable.status.toLowerCase().includes('warning')) {
          statusBadge.classList.add('warning');
        }

        // Specs grid
        specsGrid.innerHTML = '';

        function addSpec(label, value, unit = '') {
          const div = document.createElement('div');
          div.className = 'spec-item';
          div.innerHTML = `
            <div class="spec-label">${label}</div>
            <div class="spec-value">${value || '—'} ${unit ? `<small style="font-size:0.75rem;color:#5e6f7e;">${unit}</small>` : ''}</div>
          `;
          specsGrid.appendChild(div);
        }

        addSpec('Cable Type', cable.type);
        addSpec('Length', cable.length, cable.lengthUnit);
        addSpec('Impedance', cable.impedance, cable.impedanceUnit);
        
        // Connectors
        const connDiv = document.createElement('div');
        connDiv.className = 'spec-item';
        connDiv.innerHTML = `
          <div class="spec-label">Connectors</div>
          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.3rem;">
            <span class="connector-badge">A: ${cable.connA}</span>
            <span class="connector-badge">B: ${cable.connB}</span>
          </div>
        `;
        specsGrid.appendChild(connDiv);

        addSpec('Max Frequency', cable.frequencyMax);
        
        if (cable.vswr) addSpec('VSWR', cable.vswr);
        if (cable.loss) addSpec('Insertion Loss', cable.loss);

        // Footer
        lastTested.textContent = `📅 Last tested: ${cable.date}`;
        projectInfo.textContent = `📋 Project: ${cable.project}`;
      }

      // ============================================
      // Handle cable lookup
      // ============================================
      async function lookupCable(serialNumber) {
        if (!serialNumber || serialNumber.trim() === '') {
          alert('Please enter a serial number or scan a QR code');
          return;
        }

        try {
          // Show loading state
          displayCableId.textContent = 'Loading...';
          cableDashboard.classList.add('visible');
          emptyState.style.display = 'none';
          specsGrid.innerHTML = '<div class="spec-item" style="grid-column:1/-1;text-align:center;">⏳ Searching database...</div>';

          const cable = await fetchCableData(serialNumber);
          renderCableData(cable);
          
          // Update input field
          serialInput.value = cable.id;
          
        } catch (error) {
          alert(`❌ ${error.message}`);
          // Reset to empty state
          cableDashboard.classList.remove('visible');
          emptyState.style.display = '';
          serialInput.value = '';
          console.error('Lookup error:', error);
        }
      }

      // ============================================
      // QR Scanner Setup
      // ============================================
      function startScanner() {
        if (html5QrCode === null) {
          html5QrCode = new Html5Qrcode("reader");
        }

        const config = {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: "environment" }, // Rear camera
          config,
          onScanSuccess,
          onScanFailure
        ).then(() => {
          isScanning = true;
          readerDiv.classList.add('active');
          scanToggleBtn.classList.add('active');
          scanToggleBtn.innerHTML = '⏹️ Stop Scanner';
          scanHint.textContent = '📷 Scanning... Point camera at QR code on cable';
        }).catch((err) => {
          console.error('Scanner start error:', err);
          alert('Cannot access camera. Please check permissions or use manual entry.');
          stopScanner();
        });
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            isScanning = false;
            readerDiv.classList.remove('active');
            scanToggleBtn.classList.remove('active');
            scanToggleBtn.innerHTML = '📷 Scan QR Code';
            scanHint.textContent = '💡 Point camera at the QR code on the cable label';
          }).catch(err => console.error('Stop error:', err));
        }
      }

      function onScanSuccess(decodedText) {
        console.log('QR Scanned:', decodedText);
        // Stop scanner after successful scan
        stopScanner();
        // Lookup the cable
        lookupCable(decodedText);
      }

      function onScanFailure(error) {
        // QR scan failures happen frequently (every frame without QR)
        // We don't log them to avoid console spam
      }

      // ============================================
      // Event Listeners
      // ============================================
      
      // Search button
      searchBtn.addEventListener('click', () => {
        const serial = serialInput.value;
        if (serial) {
          lookupCable(serial);
        }
      });

      // Enter key in input
      serialInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const serial = serialInput.value;
          if (serial) {
            lookupCable(serial);
          }
        }
      });

      // Scan toggle button
      scanToggleBtn.addEventListener('click', () => {
        if (isScanning) {
          stopScanner();
        } else {
          startScanner();
        }
      });

      // Demo button
      demoBtn.addEventListener('click', () => {
        const demoSerials = Object.keys(cableDatabase);
        const randomSerial = demoSerials[Math.floor(Math.random() * demoSerials.length)];
        serialInput.value = randomSerial;
        lookupCable(randomSerial);
      });

      // Clean up scanner when leaving page
      window.addEventListener('beforeunload', () => {
        if (isScanning) {
          html5QrCode.stop().catch(() => {});
        }
      });

      // ============================================
      // URL Parameter Support (for direct linking)
      // ============================================
      const urlParams = new URLSearchParams(window.location.search);
      const cableParam = urlParams.get('cable');
      if (cableParam) {
        serialInput.value = cableParam;
        lookupCable(cableParam);
      }

      console.log('📡 RF Cable Scanner ready');
      console.log('📋 Available cables:', Object.keys(cableDatabase).join(', '));
      console.log('🔗 Backend simulation active - replace cableDatabase with API calls');
    })();
  </script>
</body>
</html>
