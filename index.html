<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | QR Dashboard</title>
  <!-- More reliable QR scanner library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 750px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      padding: 1rem;
    }

    /* Scanner Section */
    .scanner-section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      color: #f7b731;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .title-icon {
      background: #f7b731;
      color: #0a0f14;
      border-radius: 0.8rem;
      padding: 0.4rem 0.6rem;
      font-size: 1.2rem;
    }

    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #e0e8f0;
      transition: all 0.2s;
      outline: none;
    }

    .serial-input:focus {
      border-color: #f7b731;
      background: #151a22;
      box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1);
    }

    .serial-input::placeholder {
      color: #4a5568;
    }

    .btn {
      padding: 0.8rem 1.3rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #f7b731;
      color: #0a0f14;
    }

    .btn-primary:hover {
      background: #f0a800;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #2a3340;
      color: #e0e8f0;
    }

    .btn-secondary:hover {
      background: #3a4556;
    }

    .btn-scan {
      background: #f7b731;
      color: #0a0f14;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 1.6rem;
      box-shadow: 0 4px 15px rgba(247, 183, 49, 0.3);
    }

    .btn-scan:hover {
      background: #f0a800;
      box-shadow: 0 6px 20px rgba(247, 183, 49, 0.4);
      transform: translateY(-2px);
    }

    .btn-scan.active {
      background: #e74c3c;
      color: white;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
    }

    /* Fixed Scanner Container */
    .scanner-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0.8rem;
      display: none;
    }

    .scanner-wrapper.active {
      display: block;
    }

    #reader {
      width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
    }

    /* Overlay - now using separate divs instead of pseudo-elements */
    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Top dimmed bar */
    .overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    /* Bottom dimmed bar */
    .overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    /* Left dimmed bar */
    .overlay-left {
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    /* Right dimmed bar */
    .overlay-right {
      position: absolute;
      top: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
    }

    /* Target frame */
    .target-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 230px;
      height: 230px;
      border: 3px solid #f7b731;
      border-radius: 15px;
      box-shadow: 
        0 0 0 6px rgba(247, 183, 49, 0.2),
        0 0 40px rgba(247, 183, 49, 0.3);
      z-index: 1001;
      animation: frameGlow 2s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% { 
        border-color: rgba(247, 183, 49, 0.8);
        box-shadow: 0 0 0 6px rgba(247, 183, 49, 0.2), 0 0 40px rgba(247, 183, 49, 0.3);
      }
      50% { 
        border-color: rgba(247, 183, 49, 1);
        box-shadow: 0 0 0 8px rgba(247, 183, 49, 0.3), 0 0 60px rgba(247, 183, 49, 0.5);
      }
    }

    /* Corner brackets */
    .corner-bracket {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #f7b731;
      border-style: solid;
      z-index: 1002;
    }

    .corner-tl {
      top: calc(50% - 118px);
      left: calc(50% - 118px);
      border-width: 4px 0 0 4px;
      border-radius: 4px 0 0 0;
    }

    .corner-tr {
      top: calc(50% - 118px);
      right: calc(50% - 118px);
      border-width: 4px 4px 0 0;
      border-radius: 0 4px 0 0;
    }

    .corner-bl {
      bottom: calc(50% - 118px);
      left: calc(50% - 118px);
      border-width: 0 0 4px 4px;
      border-radius: 0 0 0 4px;
    }

    .corner-br {
      bottom: calc(50% - 118px);
      right: calc(50% - 118px);
      border-width: 0 4px 4px 0;
      border-radius: 0 0 4px 0;
    }

    /* Scan line */
    .scan-line {
      position: absolute;
      left: calc(50% - 115px);
      width: 230px;
      height: 3px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(247, 183, 49, 0.6), 
        #f7b731, 
        rgba(247, 183, 49, 0.6), 
        transparent
      );
      box-shadow: 0 0 15px rgba(247, 183, 49, 0.6);
      z-index: 1001;
      animation: scanLine 2s linear infinite;
    }

    @keyframes scanLine {
      0% { top: calc(50% - 115px); }
      50% { top: calc(50% + 115px); }
      100% { top: calc(50% - 115px); }
    }

    /* Status indicator */
    .scan-status {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1002;
      background: rgba(0, 0, 0, 0.85);
      padding: 0.6rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f7b731;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(247, 183, 49, 0.3);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f7b731;
      animation: dotPulse 1.5s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    .scan-success .target-frame {
      border-color: #27ae60 !important;
      box-shadow: 0 0 0 6px rgba(39, 174, 96, 0.3), 0 0 40px rgba(39, 174, 96, 0.5) !important;
    }

    .scan-hint {
      font-size: 0.85rem;
      color: #f7b731;
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(247, 183, 49, 0.1);
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(247, 183, 49, 0.2);
    }

    /* Error message */
    .error-message {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Cable Dashboard Card */
    .cable-dashboard {
      background: #1a1f2b;
      border-radius: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #2a3340;
      display: none;
    }

    .cable-dashboard.visible {
      display: block;
    }

    .dashboard-header {
      background: linear-gradient(105deg, #f7b731 0%, #e6a820 100%);
      padding: 1.5rem 1.8rem;
      color: #0a0f14;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .cable-badge {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: #4a3a10;
    }

    .cable-id {
      font-size: 2rem;
      font-weight: 700;
      color: #0a0f14;
    }

    .status-badge {
      background: #0a0f14;
      color: #f7b731;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-badge.warning {
      background: #e67e22;
      color: white;
    }

    .status-badge.error {
      background: #c0392b;
      color: white;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      padding: 1.5rem;
      background: #151a22;
    }

    .spec-item {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid #2a3340;
    }

    .spec-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: #6b7d90;
      margin-bottom: 0.2rem;
    }

    .spec-value {
      font-size: 1.15rem;
      font-weight: 650;
      color: #e0e8f0;
    }

    .connector-badge {
      background: #2a3340;
      color: #f7b731;
      padding: 0.2rem 0.65rem;
      border-radius: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }

    .footer-note {
      background: #11161d;
      padding: 0.8rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7d90;
      border-top: 1px solid #2a3340;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #6b7d90;
      background: #1a1f2b;
      border-radius: 1.8rem;
      border: 1px solid #2a3340;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 500px) {
      .search-box {
        flex-direction: column;
      }
      .btn {
        justify-content: center;
      }
      .specs-grid {
        grid-template-columns: 1fr 1fr;
        padding: 1rem;
      }
      .target-frame {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Scanner & Search Section -->
    <div class="scanner-section">
      <div class="app-title">
        <span class="title-icon">📡</span>
        RF Cable Scanner
      </div>
      
      <div class="search-box">
        <input 
          type="text" 
          id="serialInput" 
          class="serial-input" 
          placeholder="Enter serial (e.g., CBL-5G-0421)"
          autocomplete="off"
        >
        <button class="btn btn-primary" id="searchBtn">
          🔍 Search
        </button>
      </div>
      
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button class="btn btn-scan" id="scanToggleBtn">
          📷 Scan QR Code
        </button>
        <button class="btn btn-secondary" id="demoBtn">
          🎲 Demo Cable
        </button>
      </div>

      <!-- Scanner Container -->
      <div class="scanner-wrapper" id="scannerWrapper">
        <div id="reader"></div>
        
        <!-- Targeting Overlay -->
        <div class="scanner-overlay" id="scannerOverlay">
          <!-- Dimmed areas -->
          <div class="overlay-top" id="overlayTop"></div>
          <div class="overlay-bottom" id="overlayBottom"></div>
          <div class="overlay-left" id="overlayLeft"></div>
          <div class="overlay-right" id="overlayRight"></div>
          
          <!-- Target frame -->
          <div class="target-frame" id="targetFrame"></div>
          
          <!-- Corner brackets -->
          <div class="corner-bracket corner-tl"></div>
          <div class="corner-bracket corner-tr"></div>
          <div class="corner-bracket corner-bl"></div>
          <div class="corner-bracket corner-br"></div>
          
          <!-- Scan line -->
          <div class="scan-line" id="scanLine"></div>
          
          <!-- Status -->
          <div class="scan-status">
            <span class="status-dot"></span>
            <span id="scanStatusText">Align QR code in frame</span>
          </div>
        </div>
      </div>
      
      <div class="scan-hint" id="scanHint">
        💡 Click <strong>"Scan QR Code"</strong> and position the QR code in the center frame
      </div>
      
      <div class="error-message" id="errorMessage">
        <span>⚠️</span>
        <span id="errorText"></span>
      </div>
    </div>

    <!-- Cable Dashboard -->
    <div class="cable-dashboard" id="cableDashboard">
      <div class="dashboard-header">
        <div>
          <div class="cable-badge">RF Cable Assembly</div>
          <div class="cable-id" id="displayCableId">---</div>
        </div>
        <div>
          <span class="status-badge" id="statusBadge">Active</span>
        </div>
      </div>

      <div class="specs-grid" id="specsGrid"></div>

      <div class="footer-note">
        <span id="lastTested">📅 Last tested: ---</span>
        <span id="projectInfo">📋 Project: ---</span>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="icon">📡</div>
      <h3>Scan a QR code or enter a serial number</h3>
      <p>The cable details will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // Cable Database
      // ============================================
      const cableDatabase = {
        "CBL-5G-0421": {
          id: "CBL-5G-0421",
          type: "LMR-400-UF",
          length: "12.5",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "N-Type (M)",
          connB: "SMA (M)",
          frequencyMax: "6 GHz",
          status: "Tested • Pass",
          date: "2026-03-15",
          project: "Tower-A Sector 3",
          vswr: "1.15:1",
          loss: "0.85 dB"
        },
        "CBL-LMR-0192": {
          id: "CBL-LMR-0192",
          type: "LMR-240",
          length: "8.2",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "BNC (M)",
          connB: "BNC (M)",
          frequencyMax: "3 GHz",
          status: "Tested • Pass",
          date: "2026-06-28",
          project: "Lab Bench 4",
          vswr: "1.08:1",
          loss: "0.45 dB"
        },
        "CBL-RG58-7734": {
          id: "CBL-RG58-7734",
          type: "RG-58",
          length: "25.0",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "SMA (M)",
          connB: "SMA (M)",
          frequencyMax: "1 GHz",
          status: "Needs Retest",
          date: "2025-11-02",
          project: "Field Kit B",
          vswr: "1.42:1",
          loss: "2.1 dB"
        }
      };

      // ============================================
      // DOM Elements
      // ============================================
      const serialInput = document.getElementById('serialInput');
      const searchBtn = document.getElementById('searchBtn');
      const scanToggleBtn = document.getElementById('scanToggleBtn');
      const demoBtn = document.getElementById('demoBtn');
      const scannerWrapper = document.getElementById('scannerWrapper');
      const readerDiv = document.getElementById('reader');
      const scannerOverlay = document.getElementById('scannerOverlay');
      const targetFrame = document.getElementById('targetFrame');
      const scanStatusText = document.getElementById('scanStatusText');
      const scanHint = document.getElementById('scanHint');
      const errorMessage = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      const cableDashboard = document.getElementById('cableDashboard');
      const emptyState = document.getElementById('emptyState');
      const displayCableId = document.getElementById('displayCableId');
      const statusBadge = document.getElementById('statusBadge');
      const specsGrid = document.getElementById('specsGrid');
      const lastTested = document.getElementById('lastTested');
      const projectInfo = document.getElementById('projectInfo');

      let html5QrCode = null;
      let isScanning = false;

      // ============================================
      // Update overlay positions dynamically
      // ============================================
      function updateOverlayPositions() {
        const readerElement = readerDiv;
        if (!readerElement) return;

        const readerHeight = readerElement.offsetHeight;
        const readerWidth = readerElement.offsetWidth;
        
        if (readerHeight === 0 || readerWidth === 0) {
          // Retry after a short delay if dimensions aren't ready
          setTimeout(updateOverlayPositions, 100);
          return;
        }

        const frameSize = Math.min(230, readerWidth * 0.6, readerHeight * 0.7);
        const frameHalf = frameSize / 2;
        const centerY = readerHeight / 2;
        const centerX = readerWidth / 2;

        // Update overlay positions
        const overlayTop = document.getElementById('overlayTop');
        const overlayBottom = document.getElementById('overlayBottom');
        const overlayLeft = document.getElementById('overlayLeft');
        const overlayRight = document.getElementById('overlayRight');

        if (overlayTop) {
          overlayTop.style.height = (centerY - frameHalf) + 'px';
        }
        if (overlayBottom) {
          overlayBottom.style.height = (centerY - frameHalf) + 'px';
        }
        if (overlayLeft) {
          overlayLeft.style.width = (centerX - frameHalf) + 'px';
          overlayLeft.style.height = readerHeight + 'px';
        }
        if (overlayRight) {
          overlayRight.style.width = (centerX - frameHalf) + 'px';
          overlayRight.style.height = readerHeight + 'px';
        }

        // Update target frame size
        if (targetFrame) {
          targetFrame.style.width = frameSize + 'px';
          targetFrame.style.height = frameSize + 'px';
        }
      }

      // ============================================
      // Fetch cable data
      // ============================================
      function fetchCableData(serialNumber) {
        const cleanSerial = serialNumber.trim().toUpperCase();
        
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const cable = cableDatabase[cleanSerial];
            if (cable) {
              resolve(cable);
            } else {
              reject(new Error(`Cable "${cleanSerial}" not found in database`));
            }
          }, 300);
        });
      }

      // ============================================
      // Render cable data
      // ============================================
      function renderCableData(cable) {
        cableDashboard.classList.add('visible');
        emptyState.style.display = 'none';
        hideError();

        displayCableId.textContent = cable.id;

        statusBadge.textContent = cable.status;
        statusBadge.className = 'status-badge';
        if (cable.status.toLowerCase().includes('damaged') || 
            cable.status.toLowerCase().includes('fail')) {
          statusBadge.classList.add('error');
        } else if (cable.status.toLowerCase().includes('retest') || 
                   cable.status.toLowerCase().includes('warning')) {
          statusBadge.classList.add('warning');
        }

        specsGrid.innerHTML = '';

        function addSpec(label, value, unit = '') {
          const div = document.createElement('div');
          div.className = 'spec-item';
          div.innerHTML = `
            <div class="spec-label">${label}</div>
            <div class="spec-value">${value || '—'} ${unit ? `<small style="font-size:0.75rem;color:#6b7d90;">${unit}</small>` : ''}</div>
          `;
          specsGrid.appendChild(div);
        }

        addSpec('Cable Type', cable.type);
        addSpec('Length', cable.length, cable.lengthUnit);
        addSpec('Impedance', cable.impedance, cable.impedanceUnit);
        
        const connDiv = document.createElement('div');
        connDiv.className = 'spec-item';
        connDiv.innerHTML = `
          <div class="spec-label">Connectors</div>
          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.3rem;">
            <span class="connector-badge">A: ${cable.connA}</span>
            <span class="connector-badge">B: ${cable.connB}</span>
          </div>
        `;
        specsGrid.appendChild(connDiv);

        addSpec('Max Frequency', cable.frequencyMax);
        if (cable.vswr) addSpec('VSWR', cable.vswr);
        if (cable.loss) addSpec('Insertion Loss', cable.loss);

        lastTested.textContent = `📅 Last tested: ${cable.date}`;
        projectInfo.textContent = `📋 Project: ${cable.project}`;
      }

      // ============================================
      // Error handling
      // ============================================
      function showError(message) {
        errorText.textContent = message;
        errorMessage.classList.add('show');
      }

      function hideError() {
        errorMessage.classList.remove('show');
      }

      // ============================================
      // Handle cable lookup
      // ============================================
      async function lookupCable(serialNumber) {
        if (!serialNumber || serialNumber.trim() === '') {
          showError('Please enter a serial number or scan a QR code');
          return;
        }

        hideError();
        
        try {
          displayCableId.textContent = 'Loading...';
          cableDashboard.classList.add('visible');
          emptyState.style.display = 'none';
          specsGrid.innerHTML = '<div class="spec-item" style="grid-column:1/-1;text-align:center;color:#6b7d90;">⏳ Searching database...</div>';

          const cable = await fetchCableData(serialNumber);
          renderCableData(cable);
          serialInput.value = cable.id;
          
        } catch (error) {
          showError(error.message);
          cableDashboard.classList.remove('visible');
          emptyState.style.display = '';
          serialInput.value = '';
        }
      }

      // ============================================
      // QR Scanner
      // ============================================
      async function startScanner() {
        hideError();
        
        // Check camera availability first
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const videoDevices = devices.filter(device => device.kind === 'videoinput');
          
          if (videoDevices.length === 0) {
            showError('No camera found on this device');
            return;
          }
        } catch (err) {
          console.log('Cannot enumerate devices:', err);
        }

        if (html5QrCode === null) {
          html5QrCode = new Html5Qrcode("reader");
        }

        scannerWrapper.classList.add('active');
        
        const config = {
          fps: 10,
          qrbox: { width: 230, height: 230 },
          aspectRatio: 1.0,
          videoConstraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
          }
        };

        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
          );
          
          isScanning = true;
          scanToggleBtn.classList.add('active');
          scanToggleBtn.innerHTML = '⏹️ Stop Scanner';
          scanHint.innerHTML = '📷 <strong>Position QR code in the yellow frame</strong>';
          scanStatusText.textContent = 'Align QR code in frame';
          scanStatusText.style.color = '#f7b731';
          
          // Update overlay positions after camera starts
          setTimeout(updateOverlayPositions, 500);
          setTimeout(updateOverlayPositions, 1000);
          
          // Handle window resize
          window.addEventListener('resize', updateOverlayPositions);
          
        } catch (err) {
          console.error('Scanner start error:', err);
          
          let errorMsg = 'Cannot access camera. ';
          if (err.name === 'NotAllowedError') {
            errorMsg += 'Camera permission denied. Please allow camera access in your browser settings.';
          } else if (err.name === 'NotFoundError') {
            errorMsg += 'No camera found on this device.';
          } else if (err.name === 'NotReadableError') {
            errorMsg += 'Camera is in use by another application.';
          } else {
            errorMsg += err.message || 'Unknown error occurred.';
          }
          
          showError(errorMsg);
          stopScanner();
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            console.log('Scanner stopped');
          }).catch(err => {
            console.log('Stop error (may be normal):', err);
          }).finally(() => {
            isScanning = false;
            scannerWrapper.classList.remove('active');
            scanToggleBtn.classList.remove('active');
            scanToggleBtn.innerHTML = '📷 Scan QR Code';
            scanHint.innerHTML = '💡 Click <strong>"Scan QR Code"</strong> and position the QR code in the center frame';
            
            // Remove resize listener
            window.removeEventListener('resize', updateOverlayPositions);
            
            // Clear scanner container
            if (readerDiv) {
              readerDiv.innerHTML = '';
            }
          });
        } else {
          scannerWrapper.classList.remove('active');
          scanToggleBtn.classList.remove('active');
          scanToggleBtn.innerHTML = '📷 Scan QR Code';
        }
      }

      function onScanSuccess(decodedText) {
        console.log('✅ QR Code detected:', decodedText);
        
        // Visual feedback
        scannerOverlay.classList.add('scan-success');
        scanStatusText.textContent = '✅ QR Code Detected!';
        scanStatusText.style.color = '#27ae60';
        
        // Play success sound (optional)
        try {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          oscillator.frequency.value = 800;
          oscillator.type = 'sine';
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.3);
        } catch (e) {
          // Audio not supported
        }
        
        // Stop scanner and show data
        setTimeout(() => {
          scannerOverlay.classList.remove('scan-success');
          stopScanner();
          lookupCable(decodedText);
        }, 1000);
      }

      function onScanFailure(error) {
        // Update status text
        if (error && error.includes) {
          if (error.includes('No QR code found')) {
            scanStatusText.textContent = 'Searching for QR code...';
          } else if (error.includes('multi')) {
            scanStatusText.textContent = 'Multiple QR codes detected';
          } else {
            scanStatusText.textContent = 'Align QR code in frame';
          }
        }
        scanStatusText.style.color = '#f7b731';
      }

      // ============================================
      // Event Listeners
      // ============================================
      searchBtn.addEventListener('click', () => {
        if (serialInput.value.trim()) {
          lookupCable(serialInput.value);
        } else {
          showError('Please enter a serial number');
        }
      });

      serialInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          if (serialInput.value.trim()) {
            lookupCable(serialInput.value);
          } else {
            showError('Please enter a serial number');
          }
        }
      });

      scanToggleBtn.addEventListener('click', () => {
        if (isScanning) {
          stopScanner();
        } else {
          // Recreate reader div if it was cleared
          if (!readerDiv.innerHTML.trim() || !readerDiv.querySelector('video')) {
            readerDiv.innerHTML = '';
            html5QrCode = null;
          }
          startScanner();
        }
      });

      demoBtn.addEventListener('click', () => {
        const demos = Object.keys(cableDatabase);
        const random = demos[Math.floor(Math.random() * demos.length)];
        serialInput.value = random;
        lookupCable(random);
      });

      // Clean up on page leave
      window.addEventListener('beforeunload', () => {
        if (isScanning && html5QrCode) {
          html5QrCode.stop().catch(() => {});
        }
      });

      // URL parameter support
      const urlParams = new URLSearchParams(window.location.search);
      const cableParam = urlParams.get('cable');
      if (cableParam) {
        serialInput.value = cableParam;
        lookupCable(cableParam);
      }

      console.log('📡 RF Cable Scanner ready');
      console.log('📋 Test with these serials:', Object.keys(cableDatabase).join(', '));
      console.log('💡 If camera shows black screen:');
      console.log('   1. Check browser camera permissions');
      console.log('   2. Use HTTPS (required for camera)');
      console.log('   3. Try Chrome or Edge browser');
    })();
  </script>
</body>
</html>
