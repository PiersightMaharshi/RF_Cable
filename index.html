<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | Dashboard</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    /* Dashboard Stats */
    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.8rem;
    }

    .stat-card {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 1.2rem;
      border: 1px solid #2a3340;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #f7b731;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #6b7d90;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Header */
    .header {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
      text-align: center;
    }

    .header h1 {
      color: #f7b731;
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }

    .header .subtitle {
      color: #6b7d90;
      font-size: 0.8rem;
    }

    /* Sections */
    .section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .section-title {
      color: #f7b731;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Search */
    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #f7b731;
      outline: none;
      text-transform: uppercase;
    }

    .serial-input:focus {
      border-color: #f7b731;
      box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1);
    }

    .serial-input::placeholder {
      color: #4a5568;
      text-transform: none;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #f7b731;
      color: #0a0f14;
    }

    .btn-primary:hover {
      background: #f0a800;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #f7b731;
      color: #f7b731;
    }

    .btn-outline:hover {
      background: rgba(247, 183, 49, 0.1);
    }

    .btn-scan {
      font-size: 1rem;
      padding: 0.9rem 1.8rem;
      background: #f7b731;
      color: #0a0f14;
      font-weight: 700;
    }

    .btn-scan.scanning {
      background: #e74c3c;
      color: white;
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-success {
      background: #27ae60;
      color: white;
    }

    /* Form */
    .form-group {
      margin-bottom: 0.8rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      color: #6b7d90;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0f1319;
      border: 2px solid #2a3340;
      border-radius: 0.8rem;
      color: #e0e8f0;
      font-size: 0.9rem;
      outline: none;
    }

    .form-input:focus, .form-select:focus {
      border-color: #f7b731;
    }

    /* Cable Details */
    .cable-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .detail-item {
      background: #151a22;
      border-radius: 0.8rem;
      padding: 0.8rem;
      border: 1px solid #2a3340;
    }

    .detail-label {
      font-size: 0.7rem;
      color: #6b7d90;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .detail-value {
      font-size: 1rem;
      font-weight: 600;
      color: #e0e8f0;
    }

    .detail-value.highlight {
      color: #f7b731;
    }

    .test-report-link {
      display: inline-block;
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .test-report-link:hover {
      background: rgba(52, 152, 219, 0.3);
    }

    /* Messages */
    .message {
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
      align-items: center;
      gap: 0.5rem;
    }

    .message.show { display: flex; }
    .message.error { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.3); color: #e74c3c; }
    .message.success { background: rgba(39, 174, 96, 0.15); border: 1px solid rgba(39, 174, 96, 0.3); color: #27ae60; }
    .message.info { background: rgba(52, 152, 219, 0.15); border: 1px solid rgba(52, 152, 219, 0.3); color: #3498db; }

    /* Scanner */
    .scanner-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0.8rem;
      display: none;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      max-height: 400px;
    }

    .scanner-wrapper.active { display: block; }

    #reader { width: 100% !important; height: 100% !important; }

    /* Recent Logs */
    .log-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .log-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #2a3340;
      font-size: 0.8rem;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .mate-badge {
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .mate-badge.mated { background: rgba(39, 174, 96, 0.2); color: #27ae60; }
    .mate-badge.demated { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

    @media (max-width: 500px) {
      .search-box { flex-direction: column; }
      .cable-details { grid-template-columns: 1fr; }
      .dashboard-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <h1>📡 RF Cable Management System</h1>
      <div class="subtitle">Scan QR Code or Search PS-SR#</div>
    </div>

    <!-- Dashboard Stats -->
    <div class="dashboard-stats" id="dashboardStats">
      <div class="stat-card">
        <div class="stat-value" id="totalInventory">--</div>
        <div class="stat-label">Total Inventory</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="inUse">--</div>
        <div class="stat-label">In Use</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="available">--</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="damaged">--</div>
        <div class="stat-label">Damaged</div>
      </div>
    </div>

    <!-- Search Section -->
    <div class="section">
      <div class="section-title">🔍 Search Cable</div>
      <div class="search-box">
        <input type="text" id="psSrInput" class="serial-input" placeholder="Type PS-SR# (e.g., PS-RFCBL-1)" autocomplete="off" autofocus>
        <button class="btn btn-primary" id="searchBtn">🔍 Lookup</button>
        <button class="btn btn-scan" id="scanToggleBtn">📷 Scan QR</button>
      </div>

      <div class="scanner-wrapper" id="scannerWrapper">
        <div id="reader"></div>
      </div>

      <!-- Cable Details (shown after search) -->
      <div id="cableDetails" style="display:none;">
        <div class="cable-details" id="cableDetailsGrid"></div>
        <a href="#" id="testReportLink" class="test-report-link" target="_blank" style="display:none;">
          📄 View Test Report
        </a>
        <div id="mateCountDisplay" style="margin-top:0.5rem;color:#f7b731;"></div>
      </div>

      <!-- User Input Form (shown after search) -->
      <div id="userForm" style="display:none; margin-top:1rem;">
        <div class="section-title">📝 Log Usage</div>
        <div class="form-group">
          <label class="form-label">Your Name *</label>
          <input type="text" id="userName" class="form-input" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label class="form-label">Test Name (System/Sub-System) *</label>
          <input type="text" id="testName" class="form-input" placeholder="e.g., System-A Test">
        </div>
        <div style="display:flex; gap:0.5rem;">
          <button class="btn btn-success" id="mateBtn" style="flex:1;">🔌 Mate Connector</button>
          <button class="btn btn-danger" id="demateBtn" style="flex:1;">🔌 De-mate Connector</button>
        </div>
      </div>

      <div class="message error" id="errorMsg"><span>⚠️</span><span id="errorText"></span></div>
      <div class="message success" id="successMsg"><span>✅</span><span id="successText"></span></div>
      <div class="message info" id="infoMsg"><span>ℹ️</span><span id="infoText"></span></div>
    </div>

    <!-- Recent Activity -->
    <div class="section">
      <div class="section-title">📋 Recent Activity</div>
      <div class="log-list" id="recentLogs">
        <div style="color:#6b7d90; text-align:center;">Loading...</div>
      </div>
    </div>
  </div>
<script>
    (function() {
      // ============================================
      // 🔴 CHANGE THESE TO YOUR ACTUAL VALUES 🔴
      // ============================================
      const GITHUB_USER = 'piersightmaharshi'; // Your GitHub username
      const GITHUB_REPO = 'rf-cable'; // Your repo name
      const BRANCH = 'main'; // or 'master'
      // ============================================

      const els = {
        totalInventory: document.getElementById('totalInventory'),
        inUse: document.getElementById('inUse'),
        available: document.getElementById('available'),
        damaged: document.getElementById('damaged'),
        psSrInput: document.getElementById('psSrInput'),
        searchBtn: document.getElementById('searchBtn'),
        scanToggleBtn: document.getElementById('scanToggleBtn'),
        scannerWrapper: document.getElementById('scannerWrapper'),
        readerDiv: document.getElementById('reader'),
        cableDetails: document.getElementById('cableDetails'),
        cableDetailsGrid: document.getElementById('cableDetailsGrid'),
        testReportLink: document.getElementById('testReportLink'),
        mateCountDisplay: document.getElementById('mateCountDisplay'),
        userForm: document.getElementById('userForm'),
        userName: document.getElementById('userName'),
        testName: document.getElementById('testName'),
        mateBtn: document.getElementById('mateBtn'),
        demateBtn: document.getElementById('demateBtn'),
        errorMsg: document.getElementById('errorMsg'),
        errorText: document.getElementById('errorText'),
        successMsg: document.getElementById('successMsg'),
        successText: document.getElementById('successText'),
        infoMsg: document.getElementById('infoMsg'),
        infoText: document.getElementById('infoText'),
        recentLogs: document.getElementById('recentLogs')
      };

      let html5QrCode = null;
      let isScanning = false;
      let cableDatabase = {};
      let currentCable = null;

      // ============================================
      // HELPERS
      // ============================================
      function showMessage(type, text) {
        els.errorMsg.classList.remove('show');
        els.successMsg.classList.remove('show');
        els.infoMsg.classList.remove('show');
        if (type === 'error') { els.errorText.textContent = text; els.errorMsg.classList.add('show'); }
        else if (type === 'success') { els.successText.textContent = text; els.successMsg.classList.add('show'); }
        else if (type === 'info') { els.infoText.textContent = text; els.infoMsg.classList.add('show'); }
        setTimeout(() => { els.errorMsg.classList.remove('show'); els.successMsg.classList.remove('show'); els.infoMsg.classList.remove('show'); }, 5000);
      }

      // ============================================
      // LOAD CSV FROM GITHUB RAW URL (NO API NEEDED)
      // ============================================
      async function loadInventory() {
        try {
          const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/data/cable_inventory.csv`;
          console.log('📥 Loading CSV from:', url);
          
          const response = await fetch(url);
          console.log('📡 Response status:', response.status);
          
          if (!response.ok) {
            console.error('❌ HTTP Error:', response.status);
            // Try cables.csv in root as fallback
            const fallbackUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/cables.csv`;
            console.log('🔄 Trying fallback:', fallbackUrl);
            const fallbackResponse = await fetch(fallbackUrl);
            if (!fallbackResponse.ok) throw new Error('Cannot load CSV');
            const csvText = await fallbackResponse.text();
            parseCSV(csvText);
            return;
          }
          
          const csvText = await response.text();
          parseCSV(csvText);
          
        } catch (error) {
          console.error('❌ Load error:', error);
          showMessage('error', 'Cannot load cable data: ' + error.message);
        }
      }

      function parseCSV(csvText) {
        console.log('📋 Parsing CSV, length:', csvText.length);
        console.log('📋 Preview:', csvText.substring(0, 300));
        
        const lines = csvText.split('\n').filter(l => l.trim());
        console.log('📋 Lines found:', lines.length);
        
        if (lines.length < 2) {
          console.error('❌ CSV has less than 2 lines');
          return;
        }
        
        const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
        console.log('📋 Headers:', headers);
        
        cableDatabase = {};
        
        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(',').map(v => v.trim().replace(/^["']|["']$/g, ''));
          if (values.length < 2) continue;
          
          const row = {};
          headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
          
          // Find PS-SR# - try multiple column names
          let psSr = '';
          for (const key of Object.keys(row)) {
            const cleanKey = key.toLowerCase().replace(/[\s\-_#]+/g, '');
            if (cleanKey === 'pssr' || cleanKey.includes('pssr')) {
              psSr = row[key];
              break;
            }
          }
          // Fallback: use first column
          if (!psSr && values.length > 0) psSr = values[0];
          
          if (psSr && psSr.trim()) {
            const cleanPS = psSr.trim();
            cableDatabase[cleanPS] = {
              psSr: cleanPS,
              cableSr: row['Cable SR#'] || row['cablesr#'] || row['CableSR#'] || '',
              description: row['Description'] || row['description'] || '',
              partNo: row['Times Part No.'] || row['TimesPartNo.'] || row['timespartno'] || '',
              length: row['Length'] || row['length'] || '',
              connectorA: row['Connector - A'] || row['Connector-A'] || row['connector-a'] || '',
              connectorB: row['Connector-B'] || row['connector-b'] || '',
              testReportLink: row['Test_Report_Link'] || row['TestReportLink'] || ''
            };
          }
        }
        
        console.log('✅ Loaded', Object.keys(cableDatabase).length, 'cables');
        console.log('📊 Keys:', Object.keys(cableDatabase));
        
        if (Object.keys(cableDatabase).length > 0) {
          showMessage('success', `✅ Loaded ${Object.keys(cableDatabase).length} cables`);
        }
      }

      async function loadStatsAndLogs() {
        try {
          // Try to load stats
          const statsUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/data/dashboard_stats.json`;
          const statsRes = await fetch(statsUrl);
          if (statsRes.ok) {
            const stats = await statsRes.json();
            els.totalInventory.textContent = stats.totalInventory || Object.keys(cableDatabase).length || 0;
            els.inUse.textContent = stats.inUse || 0;
            els.available.textContent = stats.available || 0;
            els.damaged.textContent = stats.damaged || 0;
          } else {
            // Use cable count as fallback
            const count = Object.keys(cableDatabase).length;
            els.totalInventory.textContent = count;
            els.available.textContent = count;
            els.inUse.textContent = '0';
            els.damaged.textContent = '0';
          }
          
          // Try to load logs
          const logsUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/data/usage_log.json`;
          const logsRes = await fetch(logsUrl);
          if (logsRes.ok) {
            const logs = await logsRes.json();
            if (logs && logs.length > 0) {
              els.recentLogs.innerHTML = logs.slice(-20).reverse().map(log => `
                <div class="log-entry">
                  <div>
                    <strong style="color:#f7b731;">${log.psSr}</strong>
                    <span style="color:#6b7d90;"> by ${log.userName}</span>
                    <br><small style="color:#6b7d90;">${log.testName} | ${new Date(log.timestamp).toLocaleString()}</small>
                  </div>
                  <span class="mate-badge ${log.action}">${log.action.toUpperCase()}</span>
                </div>
              `).join('');
            } else {
              els.recentLogs.innerHTML = '<div style="color:#6b7d90;text-align:center;">No activity yet</div>';
            }
          }
        } catch (e) {
          console.log('Stats/logs not available yet (normal for new setup)');
        }
      }

      // ============================================
      // SEARCH
      // ============================================
      function findCable(searchTerm) {
        const term = searchTerm.trim().toUpperCase();
        console.log('🔍 Searching for:', term);
        console.log('📊 Available keys:', Object.keys(cableDatabase));
        
        if (cableDatabase[term]) return cableDatabase[term];
        
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase() === term) return cableDatabase[key];
        }
        
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase().includes(term) || term.includes(key.toUpperCase())) {
            return cableDatabase[key];
          }
        }
        
        return null;
      }

      function displayCableDetails(cable) {
        currentCable = cable;
        els.cableDetails.style.display = 'block';
        els.userForm.style.display = 'block';
        
        els.cableDetailsGrid.innerHTML = `
          <div class="detail-item"><div class="detail-label">PS-SR#</div><div class="detail-value highlight">${cable.psSr}</div></div>
          <div class="detail-item"><div class="detail-label">Cable SR#</div><div class="detail-value">${cable.cableSr || '—'}</div></div>
          <div class="detail-item" style="grid-column:1/-1;"><div class="detail-label">Description</div><div class="detail-value">${cable.description || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Times Part No.</div><div class="detail-value">${cable.partNo || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Length</div><div class="detail-value">${cable.length || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Connector A</div><div class="detail-value">${cable.connectorA || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Connector B</div><div class="detail-value">${cable.connectorB || '—'}</div></div>
        `;
        
        if (cable.testReportLink) {
          els.testReportLink.style.display = 'inline-block';
          els.testReportLink.href = cable.testReportLink;
        } else {
          els.testReportLink.style.display = 'none';
        }
      }

      async function searchCable(searchTerm) {
        if (!searchTerm?.trim()) { showMessage('error', 'Please type a PS-SR#'); return; }
        
        if (Object.keys(cableDatabase).length === 0) {
          showMessage('info', 'Loading inventory...');
          await loadInventory();
        }
        
        const cable = findCable(searchTerm);
        if (cable) {
          displayCableDetails(cable);
          showMessage('success', `✅ ${cable.psSr} found`);
        } else {
          els.cableDetails.style.display = 'none';
          els.userForm.style.display = 'none';
          showMessage('error', `"${searchTerm}" not found. Available: ${Object.keys(cableDatabase).slice(0,5).join(', ')}...`);
        }
      }

      // ============================================
      // QR SCANNER
      // ============================================
      async function startScanner() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          stream.getTracks().forEach(t => t.stop());
        } catch (err) { showMessage('error', 'Camera access denied'); return; }
        
        els.scannerWrapper.classList.add('active');
        if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
        html5QrCode = new Html5Qrcode("reader");
        
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 15, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
              stopScanner();
              els.psSrInput.value = decodedText.trim();
              searchCable(decodedText.trim());
            },
            () => {}
          );
          isScanning = true;
          els.scanToggleBtn.textContent = '⏹️ Stop';
          els.scanToggleBtn.classList.add('scanning');
        } catch (err) { showMessage('error', 'Camera error'); stopScanner(); }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().catch(() => {}).finally(() => {
            isScanning = false;
            els.scannerWrapper.classList.remove('active');
            els.scanToggleBtn.textContent = '📷 Scan QR';
            els.scanToggleBtn.classList.remove('scanning');
          });
        }
      }

      // ============================================
      // EVENT LISTENERS
      // ============================================
      els.searchBtn.addEventListener('click', () => searchCable(els.psSrInput.value));
      els.psSrInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCable(els.psSrInput.value); });
      els.scanToggleBtn.addEventListener('click', () => { isScanning ? stopScanner() : startScanner(); });

      // ============================================
      // INIT
      // ============================================
      console.log('📡 RF Cable Scanner v2 - Direct GitHub Load');
      console.log('👤 User:', GITHUB_USER);
      console.log('📁 Repo:', GITHUB_REPO);
      
      loadInventory().then(() => {
        loadStatsAndLogs();
        console.log('✅ Ready! Try searching PS-RFCBL-1');
      });
      
      // URL param
      const params = new URLSearchParams(window.location.search);
      const ps = params.get('ps') || params.get('cable');
      if (ps) { els.psSrInput.value = ps; setTimeout(() => searchCable(ps), 1500); }
    })();
  </script>
