<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | QR Dashboard</title>
  <!-- QR Scanner library -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 750px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      padding: 1rem;
    }

    /* Scanner Section */
    .scanner-section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      color: #f7b731;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .title-icon {
      background: #f7b731;
      color: #0a0f14;
      border-radius: 0.8rem;
      padding: 0.4rem 0.6rem;
      font-size: 1.2rem;
    }

    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #e0e8f0;
      transition: all 0.2s;
      outline: none;
    }

    .serial-input:focus {
      border-color: #f7b731;
      background: #151a22;
      box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1);
    }

    .serial-input::placeholder {
      color: #4a5568;
    }

    .btn {
      padding: 0.8rem 1.3rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #f7b731;
      color: #0a0f14;
    }

    .btn-primary:hover {
      background: #f0a800;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #2a3340;
      color: #e0e8f0;
    }

    .btn-secondary:hover {
      background: #3a4556;
    }

    .btn-scan {
      background: #f7b731;
      color: #0a0f14;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.9rem 1.6rem;
      box-shadow: 0 4px 15px rgba(247, 183, 49, 0.3);
    }

    .btn-scan:hover {
      background: #f0a800;
      box-shadow: 0 6px 20px rgba(247, 183, 49, 0.4);
      transform: translateY(-2px);
    }

    .btn-scan.active {
      background: #e74c3c;
      color: white;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
    }

    /* Video Scanner Container with Targeting Guide */
    .scanner-container {
      position: relative;
      width: 100%;
      border-radius: 1.2rem;
      overflow: hidden;
      background: #000;
      margin-top: 0.8rem;
      display: none;
      aspect-ratio: 4/3;
      max-height: 400px;
    }

    .scanner-container.active {
      display: block;
    }

    #reader {
      width: 100%;
      height: 100%;
    }

    /* Overlay targeting guide */
    .targeting-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Dimmed background with transparent center */
    .targeting-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        /* Top bar */
        linear-gradient(to bottom, 
          rgba(0,0,0,0.7) 0%, 
          rgba(0,0,0,0.7) calc(50% - 110px),
          transparent calc(50% - 110px),
          transparent calc(50% + 110px),
          rgba(0,0,0,0.7) calc(50% + 110px),
          rgba(0,0,0,0.7) 100%
        ),
        /* Left and right bars */
        linear-gradient(to right,
          rgba(0,0,0,0.7) 0%,
          rgba(0,0,0,0.7) calc(50% - 110px),
          transparent calc(50% - 110px),
          transparent calc(50% + 110px),
          rgba(0,0,0,0.7) calc(50% + 110px),
          rgba(0,0,0,0.7) 100%
        );
      mix-blend-mode: multiply;
    }

    /* Center target frame */
    .target-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border: 3px solid rgba(247, 183, 49, 0.8);
      border-radius: 15px;
      box-shadow: 
        0 0 0 6px rgba(247, 183, 49, 0.2),
        0 0 40px rgba(247, 183, 49, 0.3),
        inset 0 0 40px rgba(247, 183, 49, 0.05);
      animation: frameGlow 2s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% { 
        border-color: rgba(247, 183, 49, 0.8);
        box-shadow: 0 0 0 6px rgba(247, 183, 49, 0.2), 0 0 40px rgba(247, 183, 49, 0.3);
      }
      50% { 
        border-color: rgba(247, 183, 49, 1);
        box-shadow: 0 0 0 8px rgba(247, 183, 49, 0.3), 0 0 60px rgba(247, 183, 49, 0.5);
      }
    }

    /* Corner brackets */
    .corner-bracket {
      position: absolute;
      width: 25px;
      height: 25px;
      border-color: #f7b731;
      border-style: solid;
      z-index: 11;
    }

    .corner-tl {
      top: calc(50% - 115px);
      left: calc(50% - 115px);
      border-width: 4px 0 0 4px;
      border-radius: 4px 0 0 0;
    }

    .corner-tr {
      top: calc(50% - 115px);
      right: calc(50% - 115px);
      border-width: 4px 4px 0 0;
      border-radius: 0 4px 0 0;
    }

    .corner-bl {
      bottom: calc(50% - 115px);
      left: calc(50% - 115px);
      border-width: 0 0 4px 4px;
      border-radius: 0 0 0 4px;
    }

    .corner-br {
      bottom: calc(50% - 115px);
      right: calc(50% - 115px);
      border-width: 0 4px 4px 0;
      border-radius: 0 0 4px 0;
    }

    /* Center crosshair */
    .crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 11;
    }

    .crosshair::before,
    .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(247, 183, 49, 0.6);
    }

    .crosshair::before {
      width: 2px;
      height: 20px;
      left: -1px;
      top: -10px;
    }

    .crosshair::after {
      width: 20px;
      height: 2px;
      left: -10px;
      top: -1px;
    }

    /* Scanning line animation */
    .scan-line {
      position: absolute;
      left: calc(50% - 110px);
      width: 220px;
      height: 2px;
      background: linear-gradient(90deg, 
        transparent, 
        rgba(247, 183, 49, 0.8), 
        rgba(247, 183, 49, 1), 
        rgba(247, 183, 49, 0.8), 
        transparent
      );
      box-shadow: 0 0 10px rgba(247, 183, 49, 0.8);
      z-index: 11;
      animation: scanLine 2s linear infinite;
    }

    @keyframes scanLine {
      0% { top: calc(50% - 110px); }
      50% { top: calc(50% + 110px); }
      100% { top: calc(50% - 110px); }
    }

    /* Status indicator */
    .scan-status {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      background: rgba(0,0,0,0.8);
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f7b731;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f7b731;
      animation: dotPulse 1.5s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .scan-hint {
      font-size: 0.8rem;
      color: #6b7d90;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Cable Dashboard Card */
    .cable-dashboard {
      background: #1a1f2b;
      border-radius: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #2a3340;
      display: none;
    }

    .cable-dashboard.visible {
      display: block;
    }

    .dashboard-header {
      background: linear-gradient(105deg, #f7b731 0%, #e6a820 100%);
      padding: 1.5rem 1.8rem;
      color: #0a0f14;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .cable-badge {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: #4a3a10;
    }

    .cable-id {
      font-size: 2rem;
      font-weight: 700;
      color: #0a0f14;
    }

    .status-badge {
      background: #0a0f14;
      color: #f7b731;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-badge.warning {
      background: #e67e22;
      color: white;
    }

    .status-badge.error {
      background: #c0392b;
      color: white;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      padding: 1.5rem;
      background: #151a22;
    }

    .spec-item {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid #2a3340;
    }

    .spec-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: #6b7d90;
      margin-bottom: 0.2rem;
    }

    .spec-value {
      font-size: 1.15rem;
      font-weight: 650;
      color: #e0e8f0;
    }

    .connector-badge {
      background: #2a3340;
      color: #f7b731;
      padding: 0.2rem 0.65rem;
      border-radius: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }

    .footer-note {
      background: #11161d;
      padding: 0.8rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7d90;
      border-top: 1px solid #2a3340;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #6b7d90;
      background: #1a1f2b;
      border-radius: 1.8rem;
      border: 1px solid #2a3340;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Success animation */
    .scan-success {
      animation: successFlash 0.5s ease-out;
    }

    @keyframes successFlash {
      0% { 
        box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.8);
        border-color: #27ae60;
      }
      100% { 
        box-shadow: 0 0 0 20px rgba(39, 174, 96, 0);
        border-color: #f7b731;
      }
    }

    @media (max-width: 500px) {
      .search-box {
        flex-direction: column;
      }
      .btn {
        justify-content: center;
      }
      .specs-grid {
        grid-template-columns: 1fr 1fr;
        padding: 1rem;
      }
      .target-frame {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Scanner & Search Section -->
    <div class="scanner-section">
      <div class="app-title">
        <span class="title-icon">📡</span>
        RF Cable Scanner
      </div>
      
      <div class="search-box">
        <input 
          type="text" 
          id="serialInput" 
          class="serial-input" 
          placeholder="Enter serial (e.g., CBL-5G-0421)"
          autocomplete="off"
        >
        <button class="btn btn-primary" id="searchBtn">
          🔍 Search
        </button>
      </div>
      
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button class="btn btn-scan" id="scanToggleBtn">
          📷 Scan QR Code
        </button>
        <button class="btn btn-secondary" id="demoBtn">
          🎲 Demo Cable
        </button>
      </div>

      <!-- Scanner with targeting guide -->
      <div class="scanner-container" id="scannerContainer">
        <div id="reader"></div>
        
        <!-- Targeting overlay -->
        <div class="targeting-overlay">
          <div class="target-frame" id="targetFrame"></div>
          <div class="corner-bracket corner-tl"></div>
          <div class="corner-bracket corner-tr"></div>
          <div class="corner-bracket corner-bl"></div>
          <div class="corner-bracket corner-br"></div>
          <div class="crosshair"></div>
          <div class="scan-line"></div>
          <div class="scan-status">
            <span class="status-dot"></span>
            <span id="scanStatusText">Align QR code in frame</span>
          </div>
        </div>
      </div>
      
      <div class="scan-hint" id="scanHint">
        💡 Click "Scan QR Code" and position the QR code in the center frame
      </div>
    </div>

    <!-- Cable Dashboard -->
    <div class="cable-dashboard" id="cableDashboard">
      <div class="dashboard-header">
        <div>
          <div class="cable-badge">RF Cable Assembly</div>
          <div class="cable-id" id="displayCableId">---</div>
        </div>
        <div>
          <span class="status-badge" id="statusBadge">Active</span>
        </div>
      </div>

      <div class="specs-grid" id="specsGrid"></div>

      <div class="footer-note">
        <span id="lastTested">📅 Last tested: ---</span>
        <span id="projectInfo">📋 Project: ---</span>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="icon">📡</div>
      <h3>Scan a QR code or enter a serial number</h3>
      <p>The cable details will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // Cable Database (Backend Simulation)
      // ============================================
      const cableDatabase = {
        "CBL-5G-0421": {
          id: "CBL-5G-0421",
          type: "LMR-400-UF",
          length: "12.5",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "N-Type (M)",
          connB: "SMA (M)",
          frequencyMax: "6 GHz",
          status: "Tested • Pass",
          date: "2026-03-15",
          project: "Tower-A Sector 3",
          vswr: "1.15:1",
          loss: "0.85 dB"
        },
        "CBL-LMR-0192": {
          id: "CBL-LMR-0192",
          type: "LMR-240",
          length: "8.2",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "BNC (M)",
          connB: "BNC (M)",
          frequencyMax: "3 GHz",
          status: "Tested • Pass",
          date: "2026-06-28",
          project: "Lab Bench 4",
          vswr: "1.08:1",
          loss: "0.45 dB"
        },
        "CBL-RG58-7734": {
          id: "CBL-RG58-7734",
          type: "RG-58",
          length: "25.0",
          lengthUnit: "ft",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "SMA (M)",
          connB: "SMA (M)",
          frequencyMax: "1 GHz",
          status: "Needs Retest",
          date: "2025-11-02",
          project: "Field Kit B",
          vswr: "1.42:1",
          loss: "2.1 dB"
        },
        "CBL-CF-9901": {
          id: "CBL-CF-9901",
          type: "CFD-400",
          length: "3.0",
          lengthUnit: "m",
          impedance: "50",
          impedanceUnit: "Ω",
          connA: "7/16 DIN (M)",
          connB: "N-Type (F)",
          frequencyMax: "8 GHz",
          status: "Damaged",
          date: "2025-08-10",
          project: "Roof Site 2",
          vswr: "3.2:1",
          loss: "4.5 dB"
        }
      };

      // ============================================
      // DOM Elements
      // ============================================
      const serialInput = document.getElementById('serialInput');
      const searchBtn = document.getElementById('searchBtn');
      const scanToggleBtn = document.getElementById('scanToggleBtn');
      const demoBtn = document.getElementById('demoBtn');
      const scannerContainer = document.getElementById('scannerContainer');
      const readerDiv = document.getElementById('reader');
      const targetFrame = document.getElementById('targetFrame');
      const scanStatusText = document.getElementById('scanStatusText');
      const scanHint = document.getElementById('scanHint');
      const cableDashboard = document.getElementById('cableDashboard');
      const emptyState = document.getElementById('emptyState');
      const displayCableId = document.getElementById('displayCableId');
      const statusBadge = document.getElementById('statusBadge');
      const specsGrid = document.getElementById('specsGrid');
      const lastTested = document.getElementById('lastTested');
      const projectInfo = document.getElementById('projectInfo');

      let html5QrCode = null;
      let isScanning = false;

      // ============================================
      // Fetch cable data
      // ============================================
      function fetchCableData(serialNumber) {
        const cleanSerial = serialNumber.trim().toUpperCase();
        
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const cable = cableDatabase[cleanSerial];
            if (cable) {
              resolve(cable);
            } else {
              reject(new Error(`Cable "${cleanSerial}" not found`));
            }
          }, 300);
        });
      }

      // ============================================
      // Render cable data
      // ============================================
      function renderCableData(cable) {
        cableDashboard.classList.add('visible');
        emptyState.style.display = 'none';

        displayCableId.textContent = cable.id;

        statusBadge.textContent = cable.status;
        statusBadge.className = 'status-badge';
        if (cable.status.toLowerCase().includes('damaged') || 
            cable.status.toLowerCase().includes('fail')) {
          statusBadge.classList.add('error');
        } else if (cable.status.toLowerCase().includes('retest') || 
                   cable.status.toLowerCase().includes('warning')) {
          statusBadge.classList.add('warning');
        }

        specsGrid.innerHTML = '';

        function addSpec(label, value, unit = '') {
          const div = document.createElement('div');
          div.className = 'spec-item';
          div.innerHTML = `
            <div class="spec-label">${label}</div>
            <div class="spec-value">${value || '—'} ${unit ? `<small style="font-size:0.75rem;color:#6b7d90;">${unit}</small>` : ''}</div>
          `;
          specsGrid.appendChild(div);
        }

        addSpec('Cable Type', cable.type);
        addSpec('Length', cable.length, cable.lengthUnit);
        addSpec('Impedance', cable.impedance, cable.impedanceUnit);
        
        const connDiv = document.createElement('div');
        connDiv.className = 'spec-item';
        connDiv.innerHTML = `
          <div class="spec-label">Connectors</div>
          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.3rem;">
            <span class="connector-badge">A: ${cable.connA}</span>
            <span class="connector-badge">B: ${cable.connB}</span>
          </div>
        `;
        specsGrid.appendChild(connDiv);

        addSpec('Max Frequency', cable.frequencyMax);
        if (cable.vswr) addSpec('VSWR', cable.vswr);
        if (cable.loss) addSpec('Insertion Loss', cable.loss);

        lastTested.textContent = `📅 Last tested: ${cable.date}`;
        projectInfo.textContent = `📋 Project: ${cable.project}`;
      }

      // ============================================
      // Handle cable lookup
      // ============================================
      async function lookupCable(serialNumber) {
        if (!serialNumber || serialNumber.trim() === '') {
          alert('Please enter a serial number or scan a QR code');
          return;
        }

        try {
          displayCableId.textContent = 'Loading...';
          cableDashboard.classList.add('visible');
          emptyState.style.display = 'none';
          specsGrid.innerHTML = '<div class="spec-item" style="grid-column:1/-1;text-align:center;color:#6b7d90;">⏳ Searching database...</div>';

          const cable = await fetchCableData(serialNumber);
          renderCableData(cable);
          serialInput.value = cable.id;
          
        } catch (error) {
          alert(`❌ ${error.message}`);
          cableDashboard.classList.remove('visible');
          emptyState.style.display = '';
          serialInput.value = '';
        }
      }

      // ============================================
      // QR Scanner with visual feedback
      // ============================================
      function startScanner() {
        if (html5QrCode === null) {
          html5QrCode = new Html5Qrcode("reader");
        }

        const config = {
          fps: 10,
          qrbox: { width: 220, height: 220 },
          aspectRatio: 1.0,
          disableFlip: false
        };

        html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        ).then(() => {
          isScanning = true;
          scannerContainer.classList.add('active');
          scanToggleBtn.classList.add('active');
          scanToggleBtn.innerHTML = '⏹️ Stop Scanner';
          scanHint.innerHTML = '📷 <strong>Position QR code in the yellow frame</strong> - Hold steady for scan';
          scanStatusText.textContent = 'Align QR code in frame';
          scanStatusText.style.color = '#f7b731';
        }).catch((err) => {
          console.error('Scanner error:', err);
          alert('Cannot access camera. Please check permissions.');
          stopScanner();
        });
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            isScanning = false;
            scannerContainer.classList.remove('active');
            scanToggleBtn.classList.remove('active');
            scanToggleBtn.innerHTML = '📷 Scan QR Code';
            scanHint.innerHTML = '💡 Click "Scan QR Code" and position the QR code in the center frame';
            scanStatusText.textContent = 'Align QR code in frame';
            targetFrame.classList.remove('scan-success');
          }).catch(err => console.error('Stop error:', err));
        }
      }

      function onScanSuccess(decodedText) {
        console.log('✅ QR Scanned:', decodedText);
        
        // Visual success feedback
        targetFrame.classList.add('scan-success');
        scanStatusText.textContent = '✅ QR Code Detected!';
        scanStatusText.style.color = '#27ae60';
        
        // Stop scanner
        setTimeout(() => {
          stopScanner();
          lookupCable(decodedText);
        }, 800);
      }

      function onScanFailure(error) {
        // Update status text based on common errors
        if (error.includes('No QR code found')) {
          scanStatusText.textContent = 'Searching for QR code...';
        } else if (error.includes('insufficient')) {
          scanStatusText.textContent = 'Move closer to QR code';
        } else {
          scanStatusText.textContent = 'Align QR code in frame';
        }
        scanStatusText.style.color = '#f7b731';
      }

      // ============================================
      // Event Listeners
      // ============================================
      searchBtn.addEventListener('click', () => {
        const serial = serialInput.value;
        if (serial) lookupCable(serial);
      });

      serialInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && serialInput.value) {
          lookupCable(serialInput.value);
        }
      });

      scanToggleBtn.addEventListener('click', () => {
        if (isScanning) {
          stopScanner();
        } else {
          startScanner();
        }
      });

      demoBtn.addEventListener('click', () => {
        const demos = Object.keys(cableDatabase);
        const random = demos[Math.floor(Math.random() * demos.length)];
        serialInput.value = random;
        lookupCable(random);
      });

      window.addEventListener('beforeunload', () => {
        if (isScanning) {
          html5QrCode.stop().catch(() => {});
        }
      });

      // URL parameter support
      const urlParams = new URLSearchParams(window.location.search);
      const cableParam = urlParams.get('cable');
      if (cableParam) {
        serialInput.value = cableParam;
        lookupCable(cableParam);
      }

      console.log('📡 RF Cable Scanner ready with targeting guide');
      console.log('📋 Available cables:', Object.keys(cableDatabase).join(', '));
    })();
  </script>
</body>
</html>
