<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | Dashboard</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.8rem;
    }

    .stat-card {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 1.2rem;
      border: 1px solid #2a3340;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #f7b731;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #6b7d90;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
      text-align: center;
    }

    .header h1 { color: #f7b731; font-size: 1.5rem; margin-bottom: 0.3rem; }
    .header .subtitle { color: #6b7d90; font-size: 0.8rem; }

    .section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .section-title {
      color: #f7b731;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #f7b731;
      outline: none;
      text-transform: uppercase;
    }

    .serial-input:focus { border-color: #f7b731; box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1); }
    .serial-input::placeholder { color: #4a5568; text-transform: none; }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary { background: #f7b731; color: #0a0f14; }
    .btn-primary:hover { background: #f0a800; }
    .btn-outline { background: transparent; border: 2px solid #f7b731; color: #f7b731; }
    .btn-scan { font-size: 1rem; padding: 0.9rem 1.8rem; background: #f7b731; color: #0a0f14; font-weight: 700; }
    .btn-scan.scanning { background: #e74c3c; color: white; }
    .btn-success { background: #27ae60; color: white; }
    .btn-danger { background: #e74c3c; color: white; }

    .scanner-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0.8rem;
      display: none;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      max-height: 400px;
    }
    .scanner-wrapper.active { display: block; }
    #reader { width: 100% !important; height: 100% !important; }

    .form-group { margin-bottom: 0.8rem; }
    .form-label { display: block; font-size: 0.8rem; color: #6b7d90; margin-bottom: 0.3rem; text-transform: uppercase; }
    .form-input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #0f1319;
      border: 2px solid #2a3340;
      border-radius: 0.8rem;
      color: #e0e8f0;
      font-size: 0.9rem;
      outline: none;
    }
    .form-input:focus { border-color: #f7b731; }

    .cable-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .detail-item {
      background: #151a22;
      border-radius: 0.8rem;
      padding: 0.8rem;
      border: 1px solid #2a3340;
    }

    .detail-label { font-size: 0.7rem; color: #6b7d90; text-transform: uppercase; margin-bottom: 0.2rem; }
    .detail-value { font-size: 1rem; font-weight: 600; color: #e0e8f0; }
    .detail-value.highlight { color: #f7b731; }

    .test-report-link {
      display: inline-block;
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .message {
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
      align-items: center;
      gap: 0.5rem;
    }

    .message.show { display: flex; }
    .message.error { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.3); color: #e74c3c; }
    .message.success { background: rgba(39, 174, 96, 0.15); border: 1px solid rgba(39, 174, 96, 0.3); color: #27ae60; }
    .message.info { background: rgba(52, 152, 219, 0.15); border: 1px solid rgba(52, 152, 219, 0.3); color: #3498db; }

    .log-list { max-height: 300px; overflow-y: auto; }
    .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid #2a3340; font-size: 0.8rem; }
    .log-entry:last-child { border-bottom: none; }
    .mate-badge { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; }
    .mate-badge.mated { background: rgba(39, 174, 96, 0.2); color: #27ae60; }
    .mate-badge.demated { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

    @media (max-width: 500px) {
      .search-box { flex-direction: column; }
      .cable-details { grid-template-columns: 1fr; }
      .dashboard-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>📡 RF Cable Management System</h1>
      <div class="subtitle">Scan QR Code or Search PS-SR#</div>
    </div>

    <div class="dashboard-stats">
      <div class="stat-card"><div class="stat-value" id="totalInventory">--</div><div class="stat-label">Total Inventory</div></div>
      <div class="stat-card"><div class="stat-value" id="inUse">--</div><div class="stat-label">In Use</div></div>
      <div class="stat-card"><div class="stat-value" id="available">--</div><div class="stat-label">Available</div></div>
      <div class="stat-card"><div class="stat-value" id="damaged">--</div><div class="stat-label">Damaged</div></div>
    </div>

    <div class="section">
      <div class="section-title">🔍 Search Cable</div>
      <div class="search-box">
        <input type="text" id="psSrInput" class="serial-input" placeholder="Type PS-SR# (e.g., PS-RFCBL-1)" autocomplete="off" autofocus>
        <button class="btn btn-primary" id="searchBtn">🔍 Lookup</button>
        <button class="btn btn-scan" id="scanToggleBtn">📷 Scan QR</button>
      </div>
      <div class="scanner-wrapper" id="scannerWrapper"><div id="reader"></div></div>
      
      <div id="cableDetails" style="display:none;">
        <div class="cable-details" id="cableDetailsGrid"></div>
        <a href="#" id="testReportLink" class="test-report-link" target="_blank" style="display:none;">📄 View Test Report</a>
        <div id="mateCountDisplay" style="margin-top:0.5rem;color:#f7b731;"></div>
      </div>

      <div id="userForm" style="display:none; margin-top:1rem;">
        <div class="section-title">📝 Log Usage</div>
        <div class="form-group">
          <label class="form-label">Your Name *</label>
          <input type="text" id="userName" class="form-input" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label class="form-label">Test Name (System/Sub-System) *</label>
          <input type="text" id="testName" class="form-input" placeholder="e.g., System-A Test">
        </div>
        <div style="display:flex; gap:0.5rem;">
          <button class="btn btn-success" id="mateBtn" style="flex:1;">🔌 Mate Connector</button>
          <button class="btn btn-danger" id="demateBtn" style="flex:1;">🔌 De-mate Connector</button>
        </div>
      </div>

      <div class="message error" id="errorMsg"><span>⚠️</span><span id="errorText"></span></div>
      <div class="message success" id="successMsg"><span>✅</span><span id="successText"></span></div>
      <div class="message info" id="infoMsg"><span>ℹ️</span><span id="infoText"></span></div>
    </div>

    <div class="section">
      <div class="section-title">📋 Recent Activity</div>
      <div class="log-list" id="recentLogs"><div style="color:#6b7d90;text-align:center;">Loading...</div></div>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // 🔴 CHANGE THESE TO YOUR VALUES 🔴
      // ============================================
      const GITHUB_USER = 'piersightmaharshi';
      const GITHUB_REPO = 'rf-cable';
      const BRANCH = 'main';
      const CSV_PATH = 'cables.csv'; // Path to your CSV file in repo
      // ============================================

      const els = {
        totalInventory: document.getElementById('totalInventory'),
        inUse: document.getElementById('inUse'),
        available: document.getElementById('available'),
        damaged: document.getElementById('damaged'),
        psSrInput: document.getElementById('psSrInput'),
        searchBtn: document.getElementById('searchBtn'),
        scanToggleBtn: document.getElementById('scanToggleBtn'),
        scannerWrapper: document.getElementById('scannerWrapper'),
        readerDiv: document.getElementById('reader'),
        cableDetails: document.getElementById('cableDetails'),
        cableDetailsGrid: document.getElementById('cableDetailsGrid'),
        testReportLink: document.getElementById('testReportLink'),
        mateCountDisplay: document.getElementById('mateCountDisplay'),
        userForm: document.getElementById('userForm'),
        userName: document.getElementById('userName'),
        testName: document.getElementById('testName'),
        mateBtn: document.getElementById('mateBtn'),
        demateBtn: document.getElementById('demateBtn'),
        errorMsg: document.getElementById('errorMsg'),
        errorText: document.getElementById('errorText'),
        successMsg: document.getElementById('successMsg'),
        successText: document.getElementById('successText'),
        infoMsg: document.getElementById('infoMsg'),
        infoText: document.getElementById('infoText'),
        recentLogs: document.getElementById('recentLogs')
      };

      let html5QrCode = null;
      let isScanning = false;
      let cableDatabase = {};
      let currentCable = null;

      function showMessage(type, text) {
        els.errorMsg.classList.remove('show');
        els.successMsg.classList.remove('show');
        els.infoMsg.classList.remove('show');
        if (type === 'error') { els.errorText.textContent = text; els.errorMsg.classList.add('show'); }
        else if (type === 'success') { els.successText.textContent = text; els.successMsg.classList.add('show'); }
        else if (type === 'info') { els.infoText.textContent = text; els.infoMsg.classList.add('show'); }
        setTimeout(() => { els.errorMsg.classList.remove('show'); els.successMsg.classList.remove('show'); els.infoMsg.classList.remove('show'); }, 4000);
      }

      async function loadCSV() {
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${CSV_PATH}`;
        console.log('📥 Loading CSV from:', url);
        
        const response = await fetch(url);
        console.log('📡 Status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: File not found at ${url}`);
        }
        
        const text = await response.text();
        console.log('📄 Received', text.length, 'chars');
        console.log('📄 Preview:', text.substring(0, 300));
        
        const lines = text.split('\n').filter(l => l.trim());
        console.log('📋 Lines:', lines.length);
        
        if (lines.length < 2) {
          throw new Error('CSV has only ' + lines.length + ' lines');
        }
        
        const headers = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g, ''));
        console.log('📋 Headers:', headers);
        
        cableDatabase = {};
        
        for (let i = 1; i < lines.length; i++) {
          const values = lines[i].split(',').map(v => v.trim().replace(/^["']|["']$/g, ''));
          if (values.length < 2) continue;
          
          const row = {};
          headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
          
          // Find PS-SR#
          let psSr = '';
          for (const key of Object.keys(row)) {
            if (key.toLowerCase().replace(/[\s\-_#]+/g, '').includes('pssr')) {
              psSr = row[key];
              break;
            }
          }
          if (!psSr) psSr = values[0];
          
          if (psSr && psSr.trim()) {
            cableDatabase[psSr.trim()] = {
              psSr: psSr.trim(),
              cableSr: row['Cable SR#'] || row['cablesr#'] || '',
              description: row['Description'] || row['description'] || '',
              partNo: row['Times Part No.'] || row['TimesPartNo.'] || '',
              length: row['Length'] || row['length'] || '',
              connectorA: row['Connector - A'] || row['Connector-A'] || '',
              connectorB: row['Connector-B'] || row['connector-b'] || '',
              testReportLink: row['Test_Report_Link'] || row['TestReportLink'] || ''
            };
          }
        }
        
        console.log('✅ Loaded', Object.keys(cableDatabase).length, 'cables');
        console.log('📊 Keys:', Object.keys(cableDatabase));
        
        // Update dashboard
        const count = Object.keys(cableDatabase).length;
        els.totalInventory.textContent = count;
        els.available.textContent = count;
        els.inUse.textContent = '0';
        els.damaged.textContent = '0';
        
        showMessage('success', `✅ Loaded ${count} cables from GitHub`);
      }

      function findCable(searchTerm) {
        const term = searchTerm.trim().toUpperCase();
        if (cableDatabase[term]) return cableDatabase[term];
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase() === term) return cableDatabase[key];
        }
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase().includes(term) || term.includes(key.toUpperCase())) return cableDatabase[key];
        }
        return null;
      }

      function displayCable(cable) {
        currentCable = cable;
        els.cableDetails.style.display = 'block';
        els.userForm.style.display = 'block';
        
        els.cableDetailsGrid.innerHTML = `
          <div class="detail-item"><div class="detail-label">PS-SR#</div><div class="detail-value highlight">${cable.psSr}</div></div>
          <div class="detail-item"><div class="detail-label">Cable SR#</div><div class="detail-value">${cable.cableSr || '—'}</div></div>
          <div class="detail-item" style="grid-column:1/-1;"><div class="detail-label">Description</div><div class="detail-value">${cable.description || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Part No.</div><div class="detail-value">${cable.partNo || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Length</div><div class="detail-value">${cable.length || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Connector A</div><div class="detail-value">${cable.connectorA || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Connector B</div><div class="detail-value">${cable.connectorB || '—'}</div></div>
        `;
        
        if (cable.testReportLink) {
          els.testReportLink.style.display = 'inline-block';
          els.testReportLink.href = cable.testReportLink;
        } else {
          els.testReportLink.style.display = 'none';
        }
      }

      async function searchCable(searchTerm) {
        if (!searchTerm?.trim()) { showMessage('error', 'Type a PS-SR#'); return; }
        
        if (Object.keys(cableDatabase).length === 0) {
          showMessage('info', 'Loading data...');
          try {
            await loadCSV();
          } catch (e) {
            showMessage('error', e.message);
            return;
          }
        }
        
        const cable = findCable(searchTerm);
        if (cable) {
          displayCable(cable);
          showMessage('success', `✅ ${cable.psSr} found`);
        } else {
          els.cableDetails.style.display = 'none';
          els.userForm.style.display = 'none';
          showMessage('error', `"${searchTerm}" not found. Try: ${Object.keys(cableDatabase).slice(0,5).join(', ')}`);
        }
      }

      async function startScanner() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          stream.getTracks().forEach(t => t.stop());
        } catch (err) { showMessage('error', 'Camera denied'); return; }
        
        els.scannerWrapper.classList.add('active');
        if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
        html5QrCode = new Html5Qrcode("reader");
        
        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 15, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
              stopScanner();
              els.psSrInput.value = decodedText.trim();
              searchCable(decodedText.trim());
            },
            () => {}
          );
          isScanning = true;
          els.scanToggleBtn.textContent = '⏹️ Stop';
          els.scanToggleBtn.classList.add('scanning');
        } catch (err) { showMessage('error', 'Camera error'); stopScanner(); }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().catch(() => {}).finally(() => {
            isScanning = false;
            els.scannerWrapper.classList.remove('active');
            els.scanToggleBtn.textContent = '📷 Scan QR';
            els.scanToggleBtn.classList.remove('scanning');
          });
        }
      }

      // Event listeners
      els.searchBtn.addEventListener('click', () => searchCable(els.psSrInput.value));
      els.psSrInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCable(els.psSrInput.value); });
      els.scanToggleBtn.addEventListener('click', () => { isScanning ? stopScanner() : startScanner(); });
      els.mateBtn.addEventListener('click', () => showMessage('info', 'Mate/Demate logging coming soon'));
      els.demateBtn.addEventListener('click', () => showMessage('info', 'Mate/Demate logging coming soon'));

      // Init
      console.log('📡 Scanner Ready');
      console.log('🔗 CSV URL:', `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${CSV_PATH}`);
      
      loadCSV().catch(e => {
        console.error('Init load error:', e);
        showMessage('error', 'Cannot load CSV: ' + e.message);
      });
      
      // URL param
      const params = new URLSearchParams(window.location.search);
      const ps = params.get('ps') || params.get('cable');
      if (ps) { els.psSrInput.value = ps; setTimeout(() => searchCable(ps), 2000); }
    })();
  </script>
</body>
</html>
