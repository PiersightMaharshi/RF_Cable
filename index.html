<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | QR Dashboard</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 750px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .scanner-section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      color: #f7b731;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .title-icon {
      background: #f7b731;
      color: #0a0f14;
      border-radius: 0.8rem;
      padding: 0.4rem 0.6rem;
      font-size: 1.2rem;
    }

    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #e0e8f0;
      transition: all 0.2s;
      outline: none;
    }

    .serial-input:focus {
      border-color: #f7b731;
      background: #151a22;
      box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1);
    }

    .serial-input::placeholder {
      color: #4a5568;
    }

    .btn {
      padding: 0.8rem 1.3rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
      background: #f7b731;
      color: #0a0f14;
    }

    .btn:hover {
      background: #f0a800;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #f7b731;
      color: #f7b731;
    }

    .btn-outline:hover {
      background: rgba(247, 183, 49, 0.1);
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn-scan {
      font-size: 1rem;
      padding: 0.9rem 1.6rem;
      box-shadow: 0 4px 15px rgba(247, 183, 49, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(247, 183, 49, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(247, 183, 49, 0); }
    }

    /* Scanner Container */
    .scanner-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0.8rem;
      display: none;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
    }

    .scanner-wrapper.active {
      display: block;
    }

    #reader {
      width: 100% !important;
      border-radius: 1rem;
    }

    #reader video {
      border-radius: 1rem;
    }

    /* Hide default QR box border */
    #reader__scan_region {
      position: relative;
    }

    #reader__dashboard_section {
      padding: 0 !important;
    }

    #reader__dashboard_section_csr span {
      display: none;
    }

    /* Targeting Overlay */
    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .overlay-bg {
      position: absolute;
      background: rgba(0, 0, 0, 0.65);
      z-index: 11;
    }

    .overlay-top {
      top: 0;
      left: 0;
      width: 100%;
    }

    .overlay-bottom {
      bottom: 0;
      left: 0;
      width: 100%;
    }

    .overlay-left {
      top: 0;
      left: 0;
    }

    .overlay-right {
      top: 0;
      right: 0;
    }

    .target-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      border: 3px solid #f7b731;
      border-radius: 15px;
      box-shadow: 0 0 0 6px rgba(247, 183, 49, 0.2), 0 0 30px rgba(247, 183, 49, 0.3);
      z-index: 12;
      animation: frameGlow 2s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% { border-color: rgba(247, 183, 49, 0.8); }
      50% { border-color: rgba(247, 183, 49, 1); }
    }

    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: #f7b731;
      border-style: solid;
      z-index: 13;
    }

    .corner-tl { top: calc(50% - 128px); left: calc(50% - 128px); border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
    .corner-tr { top: calc(50% - 128px); right: calc(50% - 128px); border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: calc(50% - 128px); left: calc(50% - 128px); border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: calc(50% - 128px); right: calc(50% - 128px); border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: calc(50% - 125px);
      width: 250px;
      height: 2px;
      background: #f7b731;
      box-shadow: 0 0 10px #f7b731;
      z-index: 13;
      animation: scanMove 2s linear infinite;
    }

    @keyframes scanMove {
      0% { top: calc(50% - 125px); }
      50% { top: calc(50% + 125px); }
      100% { top: calc(50% - 125px); }
    }

    .scan-status-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 14;
      background: rgba(0, 0, 0, 0.85);
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #f7b731;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(247, 183, 49, 0.3);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f7b731;
      animation: dotPulse 1s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .scan-hint {
      font-size: 0.85rem;
      color: #f7b731;
      margin-top: 0.8rem;
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      background: rgba(247, 183, 49, 0.1);
      border: 1px solid rgba(247, 183, 49, 0.2);
    }

    .error-box {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.3);
      color: #e74c3c;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
    }

    .error-box.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .success-box {
      background: rgba(39, 174, 96, 0.15);
      border: 1px solid rgba(39, 174, 96, 0.3);
      color: #27ae60;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
    }

    .success-box.show {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Cable Dashboard */
    .cable-dashboard {
      background: #1a1f2b;
      border-radius: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #2a3340;
      display: none;
    }

    .cable-dashboard.visible {
      display: block;
    }

    .dashboard-header {
      background: linear-gradient(105deg, #f7b731 0%, #e6a820 100%);
      padding: 1.5rem 1.8rem;
      color: #0a0f14;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .cable-badge {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: #4a3a10;
    }

    .cable-id {
      font-size: 2rem;
      font-weight: 700;
    }

    .status-badge {
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      background: #0a0f14;
      color: #f7b731;
    }

    .status-badge.warning { background: #e67e22; color: white; }
    .status-badge.error { background: #c0392b; color: white; }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      padding: 1.5rem;
      background: #151a22;
    }

    .spec-item {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 0.9rem 1rem;
      border: 1px solid #2a3340;
    }

    .spec-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: #6b7d90;
      margin-bottom: 0.2rem;
    }

    .spec-value {
      font-size: 1.15rem;
      font-weight: 650;
      color: #e0e8f0;
    }

    .connector-badge {
      background: #2a3340;
      color: #f7b731;
      padding: 0.2rem 0.65rem;
      border-radius: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      display: inline-block;
    }

    .footer-note {
      background: #11161d;
      padding: 0.8rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7d90;
      border-top: 1px solid #2a3340;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: #6b7d90;
      background: #1a1f2b;
      border-radius: 1.8rem;
      border: 1px solid #2a3340;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 500px) {
      .search-box { flex-direction: column; }
      .btn { justify-content: center; }
      .specs-grid { grid-template-columns: 1fr 1fr; padding: 1rem; }
      .target-frame { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="scanner-section">
      <div class="app-title">
        <span class="title-icon">📡</span>
        RF Cable Scanner
      </div>
      
      <div class="search-box">
        <input 
          type="text" 
          id="serialInput" 
          class="serial-input" 
          placeholder="Enter serial (e.g., CBL-5G-0421)"
          autocomplete="off"
        >
        <button class="btn" id="searchBtn">🔍 Search</button>
      </div>
      
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button class="btn btn-scan" id="scanToggleBtn">📷 Scan QR Code</button>
        <button class="btn btn-outline" id="demoBtn">🎲 Demo</button>
      </div>

      <div class="scanner-wrapper" id="scannerWrapper">
        <div id="reader"></div>
        
        <div class="scanner-overlay" id="scannerOverlay">
          <div class="overlay-bg overlay-top" id="overlayTop"></div>
          <div class="overlay-bg overlay-bottom" id="overlayBottom"></div>
          <div class="overlay-bg overlay-left" id="overlayLeft"></div>
          <div class="overlay-bg overlay-right" id="overlayRight"></div>
          
          <div class="target-frame" id="targetFrame"></div>
          
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          
          <div class="scan-line" id="scanLine"></div>
          
          <div class="scan-status-bar">
            <span class="status-dot"></span>
            <span id="scanStatusText">Position QR code in frame</span>
          </div>
        </div>
      </div>
      
      <div class="scan-hint" id="scanHint">
        💡 <strong>Tip:</strong> Hold steady, ensure good lighting, fill the frame with QR code
      </div>
      
      <div class="error-box" id="errorBox">
        <span>⚠️</span>
        <span id="errorText"></span>
      </div>
      
      <div class="success-box" id="successBox">
        <span>✅</span>
        <span id="successText"></span>
      </div>
    </div>

    <div class="cable-dashboard" id="cableDashboard">
      <div class="dashboard-header">
        <div>
          <div class="cable-badge">RF Cable Assembly</div>
          <div class="cable-id" id="displayCableId">---</div>
        </div>
        <div>
          <span class="status-badge" id="statusBadge">Active</span>
        </div>
      </div>

      <div class="specs-grid" id="specsGrid"></div>

      <div class="footer-note">
        <span id="lastTested">📅 Last tested: ---</span>
        <span id="projectInfo">📋 Project: ---</span>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="icon">📡</div>
      <h3>Scan a QR code or enter serial number</h3>
      <p>Cable details will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // DATABASE
      // ============================================
      const cableDatabase = {
        "CBL-5G-0421": {
          id: "CBL-5G-0421",
          type: "LMR-400-UF",
          length: "12.5", lengthUnit: "ft",
          impedance: "50", impedanceUnit: "Ω",
          connA: "N-Type (M)", connB: "SMA (M)",
          frequencyMax: "6 GHz",
          status: "Tested • Pass",
          date: "2026-03-15",
          project: "Tower-A Sector 3",
          vswr: "1.15:1", loss: "0.85 dB"
        },
        "CBL-LMR-0192": {
          id: "CBL-LMR-0192",
          type: "LMR-240",
          length: "8.2", lengthUnit: "ft",
          impedance: "50", impedanceUnit: "Ω",
          connA: "BNC (M)", connB: "BNC (M)",
          frequencyMax: "3 GHz",
          status: "Tested • Pass",
          date: "2026-06-28",
          project: "Lab Bench 4",
          vswr: "1.08:1", loss: "0.45 dB"
        },
        "CBL-RG58-7734": {
          id: "CBL-RG58-7734",
          type: "RG-58",
          length: "25.0", lengthUnit: "ft",
          impedance: "50", impedanceUnit: "Ω",
          connA: "SMA (M)", connB: "SMA (M)",
          frequencyMax: "1 GHz",
          status: "Needs Retest",
          date: "2025-11-02",
          project: "Field Kit B",
          vswr: "1.42:1", loss: "2.1 dB"
        }
      };

      // ============================================
      // DOM ELEMENTS
      // ============================================
      const serialInput = document.getElementById('serialInput');
      const searchBtn = document.getElementById('searchBtn');
      const scanToggleBtn = document.getElementById('scanToggleBtn');
      const demoBtn = document.getElementById('demoBtn');
      const scannerWrapper = document.getElementById('scannerWrapper');
      const readerDiv = document.getElementById('reader');
      const scannerOverlay = document.getElementById('scannerOverlay');
      const scanStatusText = document.getElementById('scanStatusText');
      const scanHint = document.getElementById('scanHint');
      const errorBox = document.getElementById('errorBox');
      const errorText = document.getElementById('errorText');
      const successBox = document.getElementById('successBox');
      const successText = document.getElementById('successText');
      const cableDashboard = document.getElementById('cableDashboard');
      const emptyState = document.getElementById('emptyState');
      const displayCableId = document.getElementById('displayCableId');
      const statusBadge = document.getElementById('statusBadge');
      const specsGrid = document.getElementById('specsGrid');
      const lastTested = document.getElementById('lastTested');
      const projectInfo = document.getElementById('projectInfo');

      let html5QrCode = null;
      let isScanning = false;
      let scanAttempts = 0;

      // ============================================
      // FUNCTIONS
      // ============================================
      function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.add('show');
        successBox.classList.remove('show');
      }

      function showSuccess(msg) {
        successText.textContent = msg;
        successBox.classList.add('show');
        errorBox.classList.remove('show');
      }

      function hideMessages() {
        errorBox.classList.remove('show');
        successBox.classList.remove('show');
      }

      function updateOverlay() {
        const readerEl = readerDiv;
        if (!readerEl) return;
        
        const h = readerEl.offsetHeight;
        const w = readerEl.offsetWidth;
        
        if (h === 0 || w === 0) {
          setTimeout(updateOverlay, 200);
          return;
        }

        const frameSize = Math.min(250, w * 0.7, h * 0.7);
        const halfFrame = frameSize / 2;
        const centerY = h / 2;
        const centerX = w / 2;

        document.getElementById('overlayTop').style.height = (centerY - halfFrame) + 'px';
        document.getElementById('overlayBottom').style.height = (centerY - halfFrame) + 'px';
        document.getElementById('overlayLeft').style.width = (centerX - halfFrame) + 'px';
        document.getElementById('overlayLeft').style.height = h + 'px';
        document.getElementById('overlayRight').style.width = (centerX - halfFrame) + 'px';
        document.getElementById('overlayRight').style.height = h + 'px';

        const frame = document.getElementById('targetFrame');
        if (frame) {
          frame.style.width = frameSize + 'px';
          frame.style.height = frameSize + 'px';
        }
      }

      function fetchCableData(serialNumber) {
        const cleanSerial = serialNumber.trim().toUpperCase();
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const cable = cableDatabase[cleanSerial];
            if (cable) resolve(cable);
            else reject(new Error(`Cable "${cleanSerial}" not found`));
          }, 200);
        });
      }

      function renderCableData(cable) {
        cableDashboard.classList.add('visible');
        emptyState.style.display = 'none';
        hideMessages();

        displayCableId.textContent = cable.id;
        statusBadge.textContent = cable.status;
        statusBadge.className = 'status-badge';
        if (cable.status.toLowerCase().includes('damaged') || cable.status.toLowerCase().includes('fail'))
          statusBadge.classList.add('error');
        else if (cable.status.toLowerCase().includes('retest') || cable.status.toLowerCase().includes('warning'))
          statusBadge.classList.add('warning');

        specsGrid.innerHTML = '';
        
        const addSpec = (label, value, unit = '') => {
          const div = document.createElement('div');
          div.className = 'spec-item';
          div.innerHTML = `<div class="spec-label">${label}</div>
            <div class="spec-value">${value || '—'} ${unit ? `<small style="font-size:0.75rem;color:#6b7d90;">${unit}</small>` : ''}</div>`;
          specsGrid.appendChild(div);
        };

        addSpec('Cable Type', cable.type);
        addSpec('Length', cable.length, cable.lengthUnit);
        addSpec('Impedance', cable.impedance, cable.impedanceUnit);
        
        const connDiv = document.createElement('div');
        connDiv.className = 'spec-item';
        connDiv.innerHTML = `<div class="spec-label">Connectors</div>
          <div style="display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.3rem;">
            <span class="connector-badge">A: ${cable.connA}</span>
            <span class="connector-badge">B: ${cable.connB}</span>
          </div>`;
        specsGrid.appendChild(connDiv);

        addSpec('Max Frequency', cable.frequencyMax);
        if (cable.vswr) addSpec('VSWR', cable.vswr);
        if (cable.loss) addSpec('Insertion Loss', cable.loss);

        lastTested.textContent = `📅 Last tested: ${cable.date}`;
        projectInfo.textContent = `📋 Project: ${cable.project}`;
      }

      async function lookupCable(serialNumber) {
        if (!serialNumber || !serialNumber.trim()) {
          showError('Please enter a serial number or scan a QR code');
          return;
        }

        hideMessages();
        
        try {
          displayCableId.textContent = 'Loading...';
          cableDashboard.classList.add('visible');
          emptyState.style.display = 'none';
          specsGrid.innerHTML = '<div class="spec-item" style="grid-column:1/-1;text-align:center;color:#6b7d90;">⏳ Searching...</div>';

          const cable = await fetchCableData(serialNumber);
          renderCableData(cable);
          serialInput.value = cable.id;
          showSuccess(`Cable ${cable.id} loaded successfully`);
          
        } catch (error) {
          showError(error.message);
          cableDashboard.classList.remove('visible');
          emptyState.style.display = '';
        }
      }

      // ============================================
      // QR SCANNER - IMPROVED CONFIGURATION
      // ============================================
      async function startScanner() {
        hideMessages();
        scanAttempts = 0;

        // Check camera
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
          });
          stream.getTracks().forEach(track => track.stop()); // Release test stream
        } catch (err) {
          showError('Camera access denied. Please allow camera permissions.');
          return;
        }

        scannerWrapper.classList.add('active');
        
        // Recreate instance for fresh start
        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch(e) {}
        }
        
        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 15, // Higher FPS for better detection
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0,
          disableFlip: false,
          experimentalFeatures: {
            useBarCodeDetectorIfSupported: true // Better detection
          }
        };

        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
          );
          
          isScanning = true;
          scanToggleBtn.innerHTML = '⏹️ Stop Scanner';
          scanToggleBtn.classList.add('btn-danger');
          scanStatusText.textContent = 'Scanning... hold steady';
          
          setTimeout(updateOverlay, 500);
          setTimeout(updateOverlay, 1500);
          window.addEventListener('resize', updateOverlay);
          
          showSuccess('Camera active - Point at QR code');
          
        } catch (err) {
          console.error('Scanner error:', err);
          showError('Failed to start camera: ' + (err.message || 'Unknown error'));
          stopScanner();
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            console.log('Scanner stopped');
          }).catch(err => {
            console.log('Stop error:', err);
          }).finally(() => {
            cleanupScanner();
          });
        } else {
          cleanupScanner();
        }
      }

      function cleanupScanner() {
        isScanning = false;
        scannerWrapper.classList.remove('active');
        scanToggleBtn.innerHTML = '📷 Scan QR Code';
        scanToggleBtn.classList.remove('btn-danger');
        scanStatusText.textContent = 'Position QR code in frame';
        window.removeEventListener('resize', updateOverlay);
        readerDiv.innerHTML = '';
        html5QrCode = null;
      }

      function onScanSuccess(decodedText) {
        console.log('✅ QR DETECTED:', decodedText);
        scanAttempts = 0;
        
        // Visual feedback
        scannerOverlay.style.border = '3px solid #27ae60';
        scanStatusText.textContent = '✅ Detected!';
        scanStatusText.style.color = '#27ae60';
        
        // Beep sound
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 1000;
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 0.2);
        } catch(e) {}

        setTimeout(() => {
          scannerOverlay.style.border = '';
          scanStatusText.style.color = '#f7b731';
          stopScanner();
          lookupCable(decodedText.trim());
        }, 600);
      }

      function onScanFailure(error) {
        scanAttempts++;
        
        // Update status based on error
        if (error) {
          const errStr = error.toString().toLowerCase();
          if (errStr.includes('no qr code') || errStr.includes('no multi-format')) {
            scanStatusText.textContent = 'Searching for QR code...';
          } else if (errStr.includes('dark') || errStr.includes('light')) {
            scanStatusText.textContent = 'Adjust lighting on QR code';
          } else if (errStr.includes('blur')) {
            scanStatusText.textContent = 'Hold camera steady';
          } else {
            scanStatusText.textContent = `Scanning... (${scanAttempts})`;
          }
        }
        
        // Reset after 100 attempts
        if (scanAttempts > 100) {
          scanAttempts = 0;
        }
      }

      // ============================================
      // EVENT LISTENERS
      // ============================================
      searchBtn.addEventListener('click', () => {
        const val = serialInput.value.trim();
        if (val) lookupCable(val);
        else showError('Enter a serial number');
      });

      serialInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const val = serialInput.value.trim();
          if (val) lookupCable(val);
          else showError('Enter a serial number');
        }
      });

      scanToggleBtn.addEventListener('click', () => {
        if (isScanning) {
          stopScanner();
        } else {
          startScanner();
        }
      });

      demoBtn.addEventListener('click', () => {
        const demos = Object.keys(cableDatabase);
        const random = demos[Math.floor(Math.random() * demos.length)];
        serialInput.value = random;
        lookupCable(random);
      });

      window.addEventListener('beforeunload', () => {
        if (isScanning && html5QrCode) {
          html5QrCode.stop().catch(() => {});
        }
      });

      // URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const cableParam = urlParams.get('cable');
      if (cableParam) {
        serialInput.value = cableParam;
        lookupCable(cableParam);
      }

      console.log('📡 RF Cable Scanner Ready');
      console.log('✅ Test serials:', Object.keys(cableDatabase).join(', '));
      console.log('💡 Tips for QR scanning:');
      console.log('   1. Ensure good lighting on the QR code');
      console.log('   2. Hold camera steady');
      console.log('   3. Fill the yellow frame with the QR code');
      console.log('   4. Try different angles/distances');
    })();
  </script>
</body>
</html>
