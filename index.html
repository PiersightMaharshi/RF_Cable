<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RF Cable Scanner | PS-SR# QR System</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0f14;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #e0e8f0;
    }

    .app-container {
      max-width: 750px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
    }

    .header {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
      text-align: center;
    }

    .header h1 {
      color: #f7b731;
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }

    .header .subtitle {
      color: #6b7d90;
      font-size: 0.8rem;
    }

    .scanner-section {
      background: #1a1f2b;
      border-radius: 1.5rem;
      padding: 1.3rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      border: 1px solid #2a3340;
    }

    .search-box {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .serial-input {
      flex: 1;
      min-width: 180px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #2a3340;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      background: #0f1319;
      color: #f7b731;
      outline: none;
    }

    .serial-input:focus {
      border-color: #f7b731;
      box-shadow: 0 0 0 4px rgba(247, 183, 49, 0.1);
    }

    .serial-input::placeholder {
      color: #4a5568;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #f7b731;
      color: #0a0f14;
    }

    .btn-primary:hover {
      background: #f0a800;
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #f7b731;
      color: #f7b731;
    }

    .btn-outline:hover {
      background: rgba(247, 183, 49, 0.1);
    }

    .btn-scan {
      font-size: 1rem;
      padding: 0.9rem 1.8rem;
      background: #f7b731;
      color: #0a0f14;
      font-weight: 700;
      animation: pulse 2s infinite;
    }

    .btn-scan.scanning {
      background: #e74c3c;
      color: white;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(247, 183, 49, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(247, 183, 49, 0); }
    }

    .backend-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid rgba(39, 174, 96, 0.3);
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      font-size: 0.8rem;
    }

    .backend-status.offline {
      background: rgba(231, 76, 60, 0.1);
      border-color: rgba(231, 76, 60, 0.3);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #27ae60;
      animation: dotPulse 2s infinite;
    }

    .status-dot.offline {
      background: #e74c3c;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .scanner-wrapper {
      position: relative;
      width: 100%;
      margin-top: 0.8rem;
      display: none;
      border-radius: 1rem;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      max-height: 400px;
    }

    .scanner-wrapper.active {
      display: block;
    }

    #reader {
      width: 100% !important;
      height: 100% !important;
    }

    #reader video {
      object-fit: cover;
    }

    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .overlay-bg {
      position: absolute;
      background: rgba(0, 0, 0, 0.7);
      z-index: 11;
    }

    .target-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border: 3px solid #f7b731;
      border-radius: 15px;
      box-shadow: 0 0 0 6px rgba(247, 183, 49, 0.2), 0 0 30px rgba(247, 183, 49, 0.3);
      z-index: 12;
      animation: frameGlow 2s ease-in-out infinite;
    }

    @keyframes frameGlow {
      0%, 100% { border-color: rgba(247, 183, 49, 0.8); }
      50% { border-color: rgba(247, 183, 49, 1); box-shadow: 0 0 0 8px rgba(247, 183, 49, 0.4), 0 0 50px rgba(247, 183, 49, 0.5); }
    }

    .corner {
      position: absolute;
      width: 25px;
      height: 25px;
      border-color: #f7b731;
      border-style: solid;
      z-index: 13;
    }

    .corner-tl { top: calc(50% - 113px); left: calc(50% - 113px); border-width: 4px 0 0 4px; border-radius: 4px 0 0 0; }
    .corner-tr { top: calc(50% - 113px); right: calc(50% - 113px); border-width: 4px 4px 0 0; border-radius: 0 4px 0 0; }
    .corner-bl { bottom: calc(50% - 113px); left: calc(50% - 113px); border-width: 0 0 4px 4px; border-radius: 0 0 0 4px; }
    .corner-br { bottom: calc(50% - 113px); right: calc(50% - 113px); border-width: 0 4px 4px 0; border-radius: 0 0 4px 0; }

    .scan-line {
      position: absolute;
      left: calc(50% - 110px);
      width: 220px;
      height: 2px;
      background: #f7b731;
      box-shadow: 0 0 15px #f7b731;
      z-index: 13;
      animation: scanMove 2s linear infinite;
    }

    @keyframes scanMove {
      0% { top: calc(50% - 110px); }
      50% { top: calc(50% + 110px); }
      100% { top: calc(50% - 110px); }
    }

    .scan-status-text {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 14;
      background: rgba(0, 0, 0, 0.85);
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: #f7b731;
      border: 1px solid rgba(247, 183, 49, 0.3);
    }

    .message {
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-top: 0.8rem;
      display: none;
      font-size: 0.9rem;
      align-items: center;
      gap: 0.5rem;
    }

    .message.show { display: flex; }
    .message.error { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.3); color: #e74c3c; }
    .message.success { background: rgba(39, 174, 96, 0.15); border: 1px solid rgba(39, 174, 96, 0.3); color: #27ae60; }
    .message.info { background: rgba(52, 152, 219, 0.15); border: 1px solid rgba(52, 152, 219, 0.3); color: #3498db; }

    .cable-dashboard {
      background: #1a1f2b;
      border-radius: 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #2a3340;
      display: none;
    }

    .cable-dashboard.visible {
      display: block;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dashboard-header {
      background: linear-gradient(105deg, #f7b731 0%, #e6a820 100%);
      padding: 1.5rem;
      color: #0a0f14;
    }

    .ps-sr-display {
      font-size: 0.8rem;
      letter-spacing: 2px;
      font-weight: 600;
      color: #4a3a10;
      margin-bottom: 0.3rem;
    }

    .cable-id-display {
      font-size: 2rem;
      font-weight: 700;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 0.8rem;
      padding: 1.5rem;
      background: #151a22;
    }

    .spec-item {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 1rem;
      border: 1px solid #2a3340;
    }

    .spec-item.full-width {
      grid-column: 1 / -1;
    }

    .spec-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: #6b7d90;
      margin-bottom: 0.3rem;
    }

    .spec-value {
      font-size: 1.1rem;
      font-weight: 650;
      color: #e0e8f0;
    }

    .spec-value.highlight {
      color: #f7b731;
      font-size: 1.3rem;
    }

    .connector-badge {
      display: inline-block;
      background: #2a3340;
      color: #f7b731;
      padding: 0.3rem 0.8rem;
      border-radius: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0.2rem;
    }

    .footer-note {
      background: #11161d;
      padding: 0.8rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #6b7d90;
      border-top: 1px solid #2a3340;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #6b7d90;
      background: #1a1f2b;
      border-radius: 1.8rem;
      border: 1px solid #2a3340;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Debug panel */
    .debug-panel {
      background: #1a1f2b;
      border-radius: 1rem;
      padding: 1rem;
      margin-top: 0.5rem;
      border: 1px solid #2a3340;
      display: none;
      font-size: 0.75rem;
      color: #6b7d90;
      max-height: 200px;
      overflow-y: auto;
    }

    .debug-panel.show {
      display: block;
    }

    @media (max-width: 500px) {
      .search-box { flex-direction: column; }
      .specs-grid { grid-template-columns: 1fr 1fr; padding: 1rem; }
      .target-frame { width: 180px; height: 180px; }
      .cable-id-display { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <h1>📡 RF Cable Scanner</h1>
      <div class="subtitle">Scan PS-SR# QR Code to View Cable Details</div>
    </div>

    <!-- Scanner Section -->
    <div class="scanner-section">
      <div class="search-box">
        <input 
          type="text" 
          id="psSrInput" 
          class="serial-input" 
          placeholder="Enter PS-SR# (e.g., PS-RFCBL-1)"
          autocomplete="off"
          autofocus
        >
        <button class="btn btn-primary" id="searchBtn">🔍 Lookup</button>
      </div>
      
      <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
        <button class="btn btn-scan" id="scanToggleBtn">📷 Scan QR Code</button>
        <button class="btn btn-outline" id="reloadBtn">🔄 Reload Excel</button>
        <button class="btn btn-outline" id="debugBtn">🐛 Debug</button>
      </div>

      <!-- Backend Status -->
      <div class="backend-status" id="backendStatus">
        <span class="status-dot" id="backendDot"></span>
        <span id="backendStatusText">Backend: Connecting to Excel...</span>
      </div>

      <!-- Scanner -->
      <div class="scanner-wrapper" id="scannerWrapper">
        <div id="reader"></div>
        <div class="scanner-overlay">
          <div class="overlay-bg" id="overlayTop" style="top:0;left:0;width:100%;"></div>
          <div class="overlay-bg" id="overlayBottom" style="bottom:0;left:0;width:100%;"></div>
          <div class="overlay-bg" id="overlayLeft" style="top:0;left:0;"></div>
          <div class="overlay-bg" id="overlayRight" style="top:0;right:0;"></div>
          <div class="target-frame"></div>
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="scan-line"></div>
          <div class="scan-status-text" id="scanStatusText">📷 Align QR code in frame</div>
        </div>
      </div>

      <!-- Messages -->
      <div class="message error" id="errorMsg"><span>⚠️</span><span id="errorText"></span></div>
      <div class="message success" id="successMsg"><span>✅</span><span id="successText"></span></div>
      <div class="message info" id="infoMsg"><span>ℹ️</span><span id="infoText"></span></div>

      <!-- Debug Panel -->
      <div class="debug-panel" id="debugPanel"></div>
    </div>

    <!-- Cable Dashboard -->
    <div class="cable-dashboard" id="cableDashboard">
      <div class="dashboard-header">
        <div class="ps-sr-display">PS-SR# <span id="psSrDisplay">---</span></div>
        <div class="cable-id-display" id="cableSrDisplay">---</div>
      </div>

      <div class="specs-grid" id="specsGrid"></div>

      <div class="footer-note">
        <span>📋 <span id="descriptionDisplay">---</span></span>
        <span>🔢 Times Part No: <span id="partNoDisplay">---</span></span>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="icon">📡</div>
      <h3>Scan PS-SR# QR Code or Enter Manually</h3>
      <p>Cable details will appear here</p>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // 🔴 PUT YOUR ONEDRIVE EXCEL LINK HERE 🔴
      // ============================================
      const ONEDRIVE_EXCEL_LINK = 'https://piersightspace-my.sharepoint.com/:x:/g/personal/maharshi_oza_piersight_space/IQDeI7aYj6qxTrU1xdaW4MdzAT0FQZCnBVG0y5F267YxoN8?e=j9q2AW';
      // ============================================

      // DOM Elements
      const els = {
        psSrInput: document.getElementById('psSrInput'),
        searchBtn: document.getElementById('searchBtn'),
        scanToggleBtn: document.getElementById('scanToggleBtn'),
        reloadBtn: document.getElementById('reloadBtn'),
        debugBtn: document.getElementById('debugBtn'),
        scannerWrapper: document.getElementById('scannerWrapper'),
        readerDiv: document.getElementById('reader'),
        scanStatusText: document.getElementById('scanStatusText'),
        errorMsg: document.getElementById('errorMsg'),
        errorText: document.getElementById('errorText'),
        successMsg: document.getElementById('successMsg'),
        successText: document.getElementById('successText'),
        infoMsg: document.getElementById('infoMsg'),
        infoText: document.getElementById('infoText'),
        cableDashboard: document.getElementById('cableDashboard'),
        emptyState: document.getElementById('emptyState'),
        psSrDisplay: document.getElementById('psSrDisplay'),
        cableSrDisplay: document.getElementById('cableSrDisplay'),
        specsGrid: document.getElementById('specsGrid'),
        descriptionDisplay: document.getElementById('descriptionDisplay'),
        partNoDisplay: document.getElementById('partNoDisplay'),
        backendStatus: document.getElementById('backendStatus'),
        backendDot: document.getElementById('backendDot'),
        backendStatusText: document.getElementById('backendStatusText'),
        debugPanel: document.getElementById('debugPanel')
      };

      let html5QrCode = null;
      let isScanning = false;
      let cableDatabase = {}; // Will be populated from Excel only

      // ============================================
      // DEBUG LOGGING
      // ============================================
      function debugLog(message) {
        console.log(message);
        const time = new Date().toLocaleTimeString();
        els.debugPanel.innerHTML += `<div>[${time}] ${message}</div>`;
        els.debugPanel.scrollTop = els.debugPanel.scrollHeight;
      }

      // ============================================
      // UI HELPERS
      // ============================================
      function showMessage(type, text) {
        els.errorMsg.classList.remove('show');
        els.successMsg.classList.remove('show');
        els.infoMsg.classList.remove('show');
        
        if (type === 'error') {
          els.errorText.textContent = text;
          els.errorMsg.classList.add('show');
        } else if (type === 'success') {
          els.successText.textContent = text;
          els.successMsg.classList.add('show');
        } else if (type === 'info') {
          els.infoText.textContent = text;
          els.infoMsg.classList.add('show');
        }
      }

      function updateBackendStatus(online, text) {
        if (online) {
          els.backendStatus.classList.remove('offline');
          els.backendDot.classList.remove('offline');
        } else {
          els.backendStatus.classList.add('offline');
          els.backendDot.classList.add('offline');
        }
        els.backendStatusText.textContent = text;
      }

      // ============================================
      // EXCEL PARSING - IMPROVED
      // ============================================
      function parseExcelData(csvText) {
        debugLog('📋 Starting to parse Excel data...');
        debugLog(`Raw data length: ${csvText.length} characters`);
        
        // Show first 200 chars for debugging
        debugLog(`First 200 chars: ${csvText.substring(0, 200)}`);
        
        const lines = csvText.split('\n').filter(line => line.trim().length > 0);
        debugLog(`Found ${lines.length} lines in file`);
        
        if (lines.length < 2) {
          debugLog('❌ ERROR: File has less than 2 lines (need header + at least 1 data row)');
          return {};
        }
        
        // Parse header
        const headerLine = lines[0];
        debugLog(`Header line: ${headerLine}`);
        
        // Split by comma, but handle quoted values
        const headers = headerLine.split(',').map(h => h.trim().replace(/^["']|["']$/g, '').trim());
        debugLog(`Headers found: ${JSON.stringify(headers)}`);
        
        const database = {};
        
        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          
          // Split by comma, handle quoted values
          const values = line.split(',').map(v => v.trim().replace(/^["']|["']$/g, '').trim());
          
          if (values.length < 2) {
            debugLog(`⚠️ Skipping line ${i+1}: too few values`);
            continue;
          }
          
          // Create row object
          const row = {};
          headers.forEach((header, index) => {
            row[header] = values[index] || '';
          });
          
          debugLog(`Row ${i+1} raw: ${JSON.stringify(row)}`);
          
          // Find PS-SR# - try multiple possible column names
          let psSr = '';
          for (const key of Object.keys(row)) {
            const keyLower = key.toLowerCase().replace(/[\s\-_#]+/g, '');
            if (keyLower === 'pssr' || keyLower === 'pssr#' || keyLower === 'ps-sr' || keyLower === 'pssrno' || keyLower === 'pssrnumber') {
              psSr = row[key];
              break;
            }
          }
          
          // Also check first column as fallback
          if (!psSr && headers.length > 0) {
            psSr = values[0];
            debugLog(`⚠️ PS-SR# column not found by name, using first column: "${psSr}"`);
          }
          
          if (psSr && psSr.trim()) {
            const psSrClean = psSr.trim();
            
            // Find other fields - try multiple possible names
            const findField = (possibleNames) => {
              for (const name of possibleNames) {
                for (const key of Object.keys(row)) {
                  if (key.toLowerCase().replace(/[\s\-_#]+/g, '') === name.toLowerCase().replace(/[\s\-_#]+/g, '')) {
                    return row[key];
                  }
                }
              }
              return '';
            };
            
            database[psSrClean] = {
              psSr: psSrClean,
              cableSr: findField(['cablesr', 'cablesr#', 'cable#', 'cableserial', 'cableserial#']),
              description: findField(['description', 'desc', 'cabledescription']),
              partNo: findField(['timespartno', 'timespartno.', 'partno', 'partnumber', 'timespart']),
              length: findField(['length', 'cablelength']),
              connectorA: findField(['connector-a', 'connectora', 'connector a', 'conn-a']),
              connectorB: findField(['connector-b', 'connectorb', 'connector b', 'conn-b']),
              frequency: findField(['frequency', 'freq', 'maxfrequency']),
              status: findField(['status', 'condition']),
              location: findField(['location', 'site', 'project'])
            };
            
            debugLog(`✅ Added: ${psSrClean} -> ${database[psSrClean].cableSr || '(no cable SR)'}`);
          }
        }
        
        const count = Object.keys(database).length;
        debugLog(`📊 Total cables loaded: ${count}`);
        debugLog(`📊 Keys: ${Object.keys(database).join(', ')}`);
        
        return database;
      }

      async function loadExcelFile() {
        updateBackendStatus(false, 'Loading Excel...');
        debugLog('🔄 Starting Excel load...');
        debugLog(`📎 Link: ${ONEDRIVE_EXCEL_LINK}`);
        
        try {
          // Convert OneDrive link to direct download
          let downloadUrl = ONEDRIVE_EXCEL_LINK;
          
          if (downloadUrl.includes('1drv.ms')) {
            downloadUrl = downloadUrl.split('?')[0] + '?download=1';
          } else if (downloadUrl.includes('onedrive.live.com') || downloadUrl.includes('sharepoint.com')) {
            if (!downloadUrl.includes('download=1')) {
              downloadUrl += (downloadUrl.includes('?') ? '&' : '?') + 'download=1';
            }
          }
          
          debugLog(`📥 Download URL: ${downloadUrl}`);
          
          const response = await fetch(downloadUrl, {
            redirect: 'follow',
            headers: {
              'Accept': 'text/csv, application/vnd.ms-excel, application/octet-stream, */*'
            }
          });
          
          debugLog(`📡 Response status: ${response.status}`);
          debugLog(`📡 Content-Type: ${response.headers.get('content-type')}`);
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          
          const text = await response.text();
          debugLog(`📄 Received ${text.length} characters`);
          
          // Check if it's HTML (error page)
          if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
            throw new Error('Received HTML instead of Excel data. Link may require authentication.');
          }
          
          // Parse the data
          const database = parseExcelData(text);
          
          if (Object.keys(database).length === 0) {
            throw new Error('No cables found in Excel. Check column headers and data.');
          }
          
          cableDatabase = database;
          updateBackendStatus(true, `✅ Excel Loaded (${Object.keys(database).length} cables)`);
          showMessage('success', `✅ Loaded ${Object.keys(database).length} cables from Excel`);
          
          debugLog('✅ Excel load complete!');
          return database;
          
        } catch (error) {
          debugLog(`❌ ERROR: ${error.message}`);
          updateBackendStatus(false, '❌ Excel Load Failed');
          showMessage('error', 'Cannot load Excel: ' + error.message);
          cableDatabase = {};
          throw error;
        }
      }

      async function getCableData(psSrNumber) {
        const searchTerm = psSrNumber.trim();
        debugLog(`🔍 Searching for: "${searchTerm}"`);
        debugLog(`📊 Database has ${Object.keys(cableDatabase).length} entries: ${Object.keys(cableDatabase).join(', ')}`);
        
        // Try exact match
        if (cableDatabase[searchTerm]) {
          debugLog(`✅ Exact match found: ${searchTerm}`);
          return cableDatabase[searchTerm];
        }
        
        // Try case-insensitive match
        const searchUpper = searchTerm.toUpperCase();
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase() === searchUpper) {
            debugLog(`✅ Case-insensitive match: ${key}`);
            return cableDatabase[key];
          }
        }
        
        // Try partial match
        for (const key of Object.keys(cableDatabase)) {
          if (key.toUpperCase().includes(searchUpper) || searchUpper.includes(key.toUpperCase())) {
            debugLog(`✅ Partial match: ${key}`);
            return cableDatabase[key];
          }
        }
        
        debugLog(`❌ No match found for: ${searchTerm}`);
        throw new Error(`"${searchTerm}" not found. Available: ${Object.keys(cableDatabase).slice(0, 5).join(', ')}...`);
      }

      // ============================================
      // RENDER CABLE DATA
      // ============================================
      function renderCableData(cable) {
        els.cableDashboard.classList.add('visible');
        els.emptyState.style.display = 'none';
        
        els.psSrDisplay.textContent = cable.psSr || '—';
        els.cableSrDisplay.textContent = cable.cableSr || '—';
        els.descriptionDisplay.textContent = cable.description || '—';
        els.partNoDisplay.textContent = cable.partNo || '—';
        
        els.specsGrid.innerHTML = '';
        
        const addSpec = (label, value, highlight = false) => {
          const div = document.createElement('div');
          div.className = 'spec-item';
          div.innerHTML = `
            <div class="spec-label">${label}</div>
            <div class="spec-value ${highlight ? 'highlight' : ''}">${value || '—'}</div>
          `;
          els.specsGrid.appendChild(div);
        };
        
        // Description (full width)
        const descDiv = document.createElement('div');
        descDiv.className = 'spec-item full-width';
        descDiv.innerHTML = `
          <div class="spec-label">Description</div>
          <div class="spec-value highlight">${cable.description || '—'}</div>
        `;
        els.specsGrid.appendChild(descDiv);
        
        addSpec('Times Part No.', cable.partNo);
        addSpec('Length', cable.length);
        
        // Connectors (full width)
        const connDiv = document.createElement('div');
        connDiv.className = 'spec-item full-width';
        connDiv.innerHTML = `
          <div class="spec-label">Connectors</div>
          <div style="display:flex; gap:0.5rem; margin-top:0.3rem; flex-wrap:wrap;">
            <span class="connector-badge">🔌 A: ${cable.connectorA || '—'}</span>
            <span style="color:#6b7d90; align-self:center;">→</span>
            <span class="connector-badge">🔌 B: ${cable.connectorB || '—'}</span>
          </div>
        `;
        els.specsGrid.appendChild(connDiv);
        
        // Additional info
        if (cable.frequency || cable.status || cable.location) {
          const infoDiv = document.createElement('div');
          infoDiv.className = 'spec-item full-width';
          infoDiv.innerHTML = `
            <div style="display:flex; flex-wrap:wrap; gap:1rem; font-size:0.85rem;">
              ${cable.frequency ? `<span>📶 Freq: <strong>${cable.frequency}</strong></span>` : ''}
              ${cable.status ? `<span>📊 Status: <strong>${cable.status}</strong></span>` : ''}
              ${cable.location ? `<span>📍 Location: <strong>${cable.location}</strong></span>` : ''}
            </div>
          `;
          els.specsGrid.appendChild(infoDiv);
        }
        
        els.psSrInput.value = cable.psSr || '';
        showMessage('success', `✅ ${cable.psSr} loaded`);
      }

      async function lookupCable(psSrNumber) {
        if (!psSrNumber?.trim()) {
          showMessage('error', 'Please enter a PS-SR# or scan a QR code');
          return;
        }

        // If database is empty, try loading Excel first
        if (Object.keys(cableDatabase).length === 0) {
          showMessage('info', '📥 Loading Excel data first...');
          try {
            await loadExcelFile();
          } catch (error) {
            showMessage('error', 'Cannot load Excel: ' + error.message);
            return;
          }
        }

        try {
          els.cableDashboard.classList.add('visible');
          els.emptyState.style.display = 'none';
          els.specsGrid.innerHTML = '<div class="spec-item full-width" style="text-align:center;color:#6b7d90;">⏳ Searching database...</div>';

          const cable = await getCableData(psSrNumber);
          renderCableData(cable);
        } catch (error) {
          showMessage('error', error.message);
          els.cableDashboard.classList.remove('visible');
          els.emptyState.style.display = '';
        }
      }

      // ============================================
      // QR SCANNER
      // ============================================
      function updateOverlay() {
        const readerEl = els.readerDiv;
        if (!readerEl) return;
        const h = readerEl.offsetHeight;
        const w = readerEl.offsetWidth;
        if (h === 0 || w === 0) { setTimeout(updateOverlay, 200); return; }
        
        const frameSize = Math.min(220, w * 0.6, h * 0.7);
        const halfFrame = frameSize / 2;
        const centerY = h / 2;
        const centerX = w / 2;
        
        const ot = document.getElementById('overlayTop');
        const ob = document.getElementById('overlayBottom');
        const ol = document.getElementById('overlayLeft');
        const or = document.getElementById('overlayRight');
        
        if (ot) ot.style.height = (centerY - halfFrame) + 'px';
        if (ob) ob.style.height = (centerY - halfFrame) + 'px';
        if (ol) { ol.style.width = (centerX - halfFrame) + 'px'; ol.style.height = h + 'px'; }
        if (or) { or.style.width = (centerX - halfFrame) + 'px'; or.style.height = h + 'px'; }
      }

      async function startScanner() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          stream.getTracks().forEach(track => track.stop());
        } catch (err) {
          showMessage('error', 'Camera access denied.');
          return;
        }

        els.scannerWrapper.classList.add('active');
        
        if (html5QrCode) {
          try { await html5QrCode.stop(); } catch(e) {}
        }
        
        html5QrCode = new Html5Qrcode("reader");

        try {
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 15, qrbox: { width: 220, height: 220 } },
            (decodedText) => {
              els.scanStatusText.textContent = '✅ Detected!';
              els.scanStatusText.style.color = '#27ae60';
              
              setTimeout(() => {
                stopScanner();
                lookupCable(decodedText.trim());
              }, 500);
            },
            () => {
              els.scanStatusText.textContent = 'Searching...';
              els.scanStatusText.style.color = '#f7b731';
            }
          );
          
          isScanning = true;
          els.scanToggleBtn.textContent = '⏹️ Stop';
          els.scanToggleBtn.classList.add('scanning');
          setTimeout(updateOverlay, 500);
          window.addEventListener('resize', updateOverlay);
          
        } catch (err) {
          showMessage('error', 'Camera error: ' + err.message);
          stopScanner();
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().catch(() => {}).finally(() => {
            isScanning = false;
            els.scannerWrapper.classList.remove('active');
            els.scanToggleBtn.textContent = '📷 Scan QR Code';
            els.scanToggleBtn.classList.remove('scanning');
            els.scanStatusText.textContent = '📷 Align QR code';
            els.scanStatusText.style.color = '#f7b731';
            window.removeEventListener('resize', updateOverlay);
          });
        }
      }

      // ============================================
      // EVENT LISTENERS
      // ============================================
      els.searchBtn.addEventListener('click', () => lookupCable(els.psSrInput.value));
      
      els.psSrInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') lookupCable(els.psSrInput.value);
      });

      els.scanToggleBtn.addEventListener('click', () => {
        isScanning ? stopScanner() : startScanner();
      });

      els.reloadBtn.addEventListener('click', async () => {
        cableDatabase = {};
        els.cableDashboard.classList.remove('visible');
        els.emptyState.style.display = '';
        debugLog('🔄 Manual reload triggered');
        els.debugPanel.innerHTML = '';
        try {
          await loadExcelFile();
        } catch (error) {
          // Error already shown
        }
      });

      els.debugBtn.addEventListener('click', () => {
        els.debugPanel.classList.toggle('show');
        if (els.debugPanel.classList.contains('show')) {
          debugLog('🐛 Debug panel opened');
          debugLog(`📊 Current database keys: ${Object.keys(cableDatabase).join(', ') || '(empty)'}`);
        }
      });

      // ============================================
      // INITIALIZATION
      // ============================================
      console.log('📡 RF Cable Scanner Ready');
      
      // Auto-load Excel on startup
      loadExcelFile().catch(() => {
        updateBackendStatus(false, 'Excel not loaded. Click 🔄 Reload');
      });
      
      // URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const psParam = urlParams.get('ps') || urlParams.get('cable');
      if (psParam) {
        els.psSrInput.value = psParam;
        // Wait for Excel to load then search
        setTimeout(() => lookupCable(psParam), 2000);
      }
    })();
  </script>
</body>
</html>
